<svg xmlns="http://www.w3.org/2000/svg" width="6.0in" height="4.8in" viewBox="0 0 960 768" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Phân cấp bộ nhớ đệm trong SoC</title>
  <desc id="desc">Sơ đồ phân cấp bộ nhớ đệm từ MMU, L1I/L1D, L2 đến Bộ nhớ chính qua TileLink-UH, kèm cơ chế bypass MMIO và các chính sách LRU, write-through.</desc>

  <defs>
    <!-- Mũi tên mặc định -->
    <marker id="arrowEnd" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <!-- Mũi tên nạp lại (Refill) - Màu xanh lá cây -->
    <marker id="arrowRefill" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2b8a3e"/>
    </marker>
    <!-- Mũi tên ghi xuống (Write) - Màu xanh dương -->
    <marker id="arrowWrite" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#1c7ed6"/>
    </marker>
    <!-- Mũi tên Bypass - Màu cam -->
    <marker id="arrowBypass" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#e8590c"/>
    </marker>
  </defs>

  <style>
    .bg { fill:#ffffff; }
    .box { stroke:#2d3436; stroke-width:2.0; stroke-linejoin:round; }
    
    /* Màu nền các thành phần */
    .mmu { fill:#e8e9fb; }       /* Xanh lavender nhạt */
    .l1cache { fill:#eaf6ff; }   /* Xanh cyan nhạt */
    .l2cache { fill:#fdfbe0; }   /* Vàng/nhũ nhạt */
    .mem { fill:#e6f4ea; }       /* Xanh lá nhạt */
    
    /* Khung con */
    .statsBox { fill:#ffffff; stroke:#8fa3b8; stroke-width:1.5; rx:4px; }
    .noteBox { fill:#fff9db; stroke:#e8590c; stroke-width:1.5; stroke-dasharray:6 4; rx:8px; }
    
    /* Đường nối và mũi tên */
    .pathNormal { fill:none; stroke:#2d3436; stroke-width:2.5; marker-end:url(#arrowEnd); }
    .pathWrite { fill:none; stroke:#1c7ed6; stroke-width:2.8; marker-end:url(#arrowWrite); }
    .pathRefill { fill:none; stroke:#2b8a3e; stroke-width:2.8; marker-end:url(#arrowRefill); }
    .pathBypass { fill:none; stroke:#e8590c; stroke-width:2.8; stroke-dasharray:7 4; marker-end:url(#arrowBypass); }
    
    /* Định kiểu văn bản (Kích thước lớn để in ra rõ ràng) */
    .titleText { font-size:24px; fill:#2d3436; font-weight:850; text-anchor:middle; }
    .bodyText { font-size:18px; fill:#2d3436; font-weight:750; text-anchor:middle; }
    .italicText { font-size:16px; fill:#52616f; font-weight:750; font-style:italic; text-anchor:middle; }
    .labelText { font-size:15px; fill:#2d3436; font-weight:800; text-anchor:middle; }
    .mono { font-family:Consolas, "Courier New", monospace; }
    
    /* Nhãn trên đường truyền */
    .labelWrite { font-size:16px; fill:#1c7ed6; font-weight:850; }
    .labelRefill { font-size:16px; fill:#2b8a3e; font-weight:850; }
    .labelBypass { font-size:16px; fill:#e8590c; font-weight:850; }
    .labelNormal { font-size:16px; fill:#2d3436; font-weight:850; }
  </style>

  <!-- Nền trắng toàn cục -->
  <rect class="bg" x="0" y="0" width="960" height="768"/>

  <!-- ==================== KHỐI MMU ==================== -->
  <rect x="300" y="40" width="360" height="70" rx="10" class="box mmu"/>
  <text x="480" y="82" class="titleText">MMU</text>

  <!-- Hai đường khác nhau xuất phát từ dưới MMU xuống L1I và L1D (Căn đều và kéo dài phần ngang) -->
  <path d="M 440,110 V 145 H 270 V 180" class="pathNormal"/>
  <path d="M 520,110 V 145 H 690 V 180" class="pathNormal"/>
  
  <!-- Chữ nhãn được dịch chuyển xa các dây nối đứng để không bị che khuất -->
  <text x="340" y="138" class="labelNormal" text-anchor="middle">Truy cập lệnh</text>
  <text x="620" y="138" class="labelNormal" text-anchor="middle">Truy cập dữ liệu</text>

  <!-- ==================== KHỐI L1I CACHE ==================== -->
  <rect x="120" y="180" width="300" height="170" rx="10" class="box l1cache"/>
  <text x="270" y="215" class="titleText">L1I Cache</text>
  <text x="270" y="240" class="bodyText mono">16 × 4 × 64B</text>
  <text x="270" y="265" class="bodyText">hit: 1 / miss: 5 chu kỳ</text>
  <text x="270" y="288" class="italicText">LRU, write-through</text>
  
  <!-- Ô thống kê của L1I (Đã loại bỏ subtext, căn giữa đứng) -->
  <rect x="140" y="302" width="260" height="35" rx="6" class="statsBox"/>
  <text x="270" y="325" class="bodyText" font-weight="bold">Thống kê hit/miss</text>

  <!-- ==================== KHỐI L1D CACHE ==================== -->
  <rect x="540" y="180" width="300" height="170" rx="10" class="box l1cache"/>
  <text x="690" y="215" class="titleText">L1D Cache</text>
  <text x="690" y="240" class="bodyText mono">16 × 4 × 64B</text>
  <text x="690" y="265" class="bodyText">hit: 1 / miss: 5 chu kỳ</text>
  <text x="690" y="288" class="italicText">LRU, write-through</text>
  
  <!-- Ô thống kê của L1D (Đã loại bỏ subtext, căn giữa đứng) -->
  <rect x="560" y="302" width="260" height="35" rx="6" class="statsBox"/>
  <text x="690" y="325" class="bodyText" font-weight="bold">Thống kê hit/miss</text>

  <!-- ==================== ĐƯỜNG KẾT NỐI GIỮA L1 VÀ L2 ==================== -->
  <!-- L1I <-> L2 -->
  <path d="M 230,350 V 460" class="pathWrite"/>
  <path d="M 310,460 V 350" class="pathRefill"/>
  
  <text x="220" y="410" class="labelWrite" text-anchor="end">write-through</text>
  <text x="320" y="410" class="labelRefill" text-anchor="start">refill: 16 nhịp × 4B</text>

  <!-- L1D <-> L2 -->
  <path d="M 650,350 V 460" class="pathWrite"/>
  <path d="M 730,460 V 350" class="pathRefill"/>
  
  <text x="640" y="410" class="labelWrite" text-anchor="end">write-through</text>
  <text x="740" y="410" class="labelRefill" text-anchor="start">refill: 16 nhịp × 4B</text>

  <!-- ==================== KHỐI L2 CACHE ==================== -->
  <rect x="200" y="460" width="560" height="170" rx="10" class="box l2cache"/>
  <text x="480" y="495" class="titleText">L2 Cache</text>
  <text x="480" y="520" class="bodyText mono">64 × 4 × 64B</text>
  <text x="480" y="545" class="bodyText">hit: 2 / miss: 10 chu kỳ</text>
  <text x="480" y="568" class="italicText">LRU, write-through</text>
  
  <!-- Ô thống kê của L2 (Đã loại bỏ subtext, căn giữa đứng) -->
  <rect x="350" y="582" width="260" height="35" rx="6" class="statsBox"/>
  <text x="480" y="605" class="bodyText" font-weight="bold">Thống kê hit/miss</text>

  <!-- ==================== ĐƯỜNG KẾT NỐI GIỮA L2 VÀ BỘ NHỚ ==================== -->
  <path d="M 430,630 V 690" class="pathWrite"/>
  <path d="M 530,690 V 630" class="pathRefill"/>
  
  <text x="420" y="665" class="labelWrite" text-anchor="end">write-through</text>
  <text x="540" y="665" class="labelRefill" text-anchor="start">refill: 16 nhịp × 4B</text>

  <!-- ==================== KHỐI MAIN MEMORY ==================== -->
  <rect x="200" y="690" width="560" height="70" rx="10" class="box mem"/>
  <text x="480" y="722" class="titleText">TileLink-UH → Main Memory</text>
  <text x="480" y="747" class="bodyText">Độ trễ (latency): 20 chu kỳ</text>

  <!-- ==================== ĐƯỜNG BYPASS MMIO (KHÔNG LƯU ĐỆM) ==================== -->
  <path d="M 660,80 H 930 V 722 H 760" class="pathBypass"/>

  <!-- Hộp chú thích cho đường Bypass (Đã rút gọn nội dung) -->
  <rect x="770" y="460" width="140" height="105" rx="8" class="noteBox"/>
  <text x="840" y="490" class="bodyText" fill="#e8590c" font-weight="bold">Bypass MMIO</text>
  <text x="840" y="515" class="labelText" font-weight="bold">(Không qua cache)</text>
  <text x="840" y="538" class="labelText" font-weight="bold">thẳng xuống bus</text>
</svg>
