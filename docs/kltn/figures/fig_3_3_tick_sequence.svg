<svg xmlns="http://www.w3.org/2000/svg" width="15.5cm" height="9.43cm" viewBox="15 42 970 590" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="desc">
  <title id="title">Trình tự tick một chu kỳ và lan truyền yêu cầu</title>
  <desc id="desc">Phần trên biểu diễn thứ tự gọi tick trong một chu kỳ mô phỏng; phần dưới biểu diễn một thao tác nạp dữ liệu lan qua cache, bus và bộ nhớ rồi trả phản hồi về CPU.</desc>
  <defs>
    <marker id="aEnd" markerWidth="10" markerHeight="10" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <marker id="aEndMuted" markerWidth="10" markerHeight="10" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#636e72"/>
    </marker>
  </defs>
  <style>
    .frame{fill:none;stroke:#9aa3ad;stroke-width:1.25;stroke-dasharray:5 4}
    .blk{stroke:#2d3436;stroke-width:1.4}
    .compute{fill:#fde8e8}
    .memory{fill:#e8e9fb}
    .bus{fill:#efe9f5}
    .periph{fill:#fdfbe0}
    .state{fill:#ffffff}
    .stall{fill:#fde8e8;stroke:#2d3436;stroke-width:1.35}
    .ok{fill:#e8e9fb;stroke:#2d3436;stroke-width:1.35}
    .grid{stroke:#d6dbe0;stroke-width:1}
    .link{stroke:#2d3436;stroke-width:1.8;fill:none;marker-end:url(#aEnd)}
    .muted-link{stroke:#636e72;stroke-width:1.6;fill:none;marker-end:url(#aEndMuted)}
    .title{display:none;font-size:17px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .sec{font-size:16.2px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .lbl{font-size:15.3px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .sub{font-size:13.6px;fill:#636e72;text-anchor:middle}
    .tiny{font-size:13.4px;fill:#636e72;text-anchor:middle}
    .lane{font-size:14.2px;fill:#2d3436;font-weight:700;text-anchor:start}
  </style>

  <text x="500" y="34" class="title">Trình tự tick một chu kỳ và lan truyền yêu cầu</text>

  <!-- Part A: one-cycle tick order -->
  <rect x="30" y="58" width="940" height="166" rx="8" class="frame"/>
  <text x="500" y="84" class="sec">(a) Thứ tự tiến bước trong một chu kỳ simulator.tick()</text>

  <g transform="translate(54 112)">
    <rect x="0" y="0" width="70" height="48" rx="6" class="blk compute"/>
    <text x="35" y="21" class="lbl">CPU</text>
    <text x="35" y="37" class="tiny">Tick</text>
    <rect x="92" y="0" width="70" height="48" rx="6" class="blk compute"/>
    <text x="127" y="21" class="lbl">DMA</text>
    <text x="127" y="37" class="tiny">Tick</text>
    <rect x="184" y="0" width="70" height="48" rx="6" class="blk memory"/>
    <text x="219" y="21" class="lbl">L1I</text>
    <text x="219" y="37" class="tiny">Tick</text>
    <rect x="276" y="0" width="70" height="48" rx="6" class="blk memory"/>
    <text x="311" y="21" class="lbl">L1D</text>
    <text x="311" y="37" class="tiny">Tick</text>
    <rect x="368" y="0" width="70" height="48" rx="6" class="blk memory"/>
    <text x="403" y="21" class="lbl">L2</text>
    <text x="403" y="37" class="tiny">Tick</text>
    <rect x="460" y="0" width="78" height="48" rx="6" class="blk bus"/>
    <text x="499" y="21" class="lbl">TL-UH</text>
    <text x="499" y="37" class="tiny">Tick</text>
    <rect x="560" y="0" width="78" height="48" rx="6" class="blk bus"/>
    <text x="599" y="21" class="lbl">TL-UL</text>
    <text x="599" y="37" class="tiny">Tick</text>
    <rect x="660" y="0" width="82" height="48" rx="6" class="blk memory"/>
    <text x="701" y="21" class="lbl">Memory</text>
    <text x="701" y="37" class="tiny">Tick</text>
    <rect x="764" y="0" width="70" height="48" rx="6" class="blk periph"/>
    <text x="799" y="21" class="lbl">UART</text>
    <text x="799" y="37" class="tiny">Tick</text>
    <rect x="850" y="0" width="56" height="48" rx="6" class="blk state"/>
    <text x="878" y="21" class="lbl">cycle</text>
    <text x="878" y="37" class="tiny">+= 1</text>

    <path d="M70 24 L92 24" class="link"/>
    <path d="M162 24 L184 24" class="link"/>
    <path d="M254 24 L276 24" class="link"/>
    <path d="M346 24 L368 24" class="link"/>
    <path d="M438 24 L460 24" class="link"/>
    <path d="M538 24 L560 24" class="link"/>
    <path d="M638 24 L660 24" class="link"/>
    <path d="M742 24 L764 24" class="link"/>
    <path d="M834 24 L850 24" class="link"/>
  </g>
  <text x="500" y="198" class="sub">MMU dịch địa chỉ ngay trên đường yêu cầu, không có bước tick riêng.</text>

  <!-- Part B: request/response propagation -->
  <rect x="30" y="248" width="940" height="368" rx="8" class="frame"/>
  <text x="500" y="276" class="sec">(b) Một thao tác nạp dữ liệu lan qua nhiều chu kỳ</text>

  <!-- Timeline grid -->
  <g transform="translate(87 308)">
    <line x1="0" y1="0" x2="0" y2="230" class="grid"/>
    <line x1="110" y1="0" x2="110" y2="230" class="grid"/>
    <line x1="220" y1="0" x2="220" y2="230" class="grid"/>
    <line x1="330" y1="0" x2="330" y2="230" class="grid"/>
    <line x1="470" y1="0" x2="470" y2="230" class="grid"/>
    <line x1="610" y1="0" x2="610" y2="230" class="grid"/>
    <line x1="720" y1="0" x2="720" y2="230" class="grid"/>
    <line x1="830" y1="0" x2="830" y2="230" class="grid"/>

    <text x="0" y="-12" class="tiny">N</text>
    <text x="110" y="-12" class="tiny">N+1</text>
    <text x="220" y="-12" class="tiny">N+2</text>
    <text x="330" y="-12" class="tiny">N+3</text>
    <text x="470" y="-12" class="tiny">N+k</text>
    <text x="610" y="-12" class="tiny">N+k+1</text>
    <text x="720" y="-12" class="tiny">N+k+2</text>
    <text x="830" y="-12" class="tiny">N+k+3</text>

    <text x="-43" y="12" class="lane">Yêu cầu</text>
    <text x="-43" y="104" class="lane">Phản hồi</text>
    <!-- Request lane -->
    <rect x="-47" y="20" width="94" height="52" rx="6" class="blk compute"/>
    <text x="0" y="37" class="lbl">CPU</text>
    <text x="0" y="52" class="tiny">Phát Get</text>
    <text x="0" y="66" class="tiny">Qua MMU</text>
    <rect x="66" y="20" width="88" height="52" rx="6" class="blk memory"/>
    <text x="110" y="40" class="lbl">L1D</text>
    <text x="110" y="56" class="tiny">Chuyển tiếp</text>
    <rect x="176" y="20" width="88" height="52" rx="6" class="blk memory"/>
    <text x="220" y="40" class="lbl">L2</text>
    <text x="220" y="56" class="tiny">Chuyển tiếp</text>
    <rect x="284" y="20" width="92" height="52" rx="6" class="blk bus"/>
    <text x="330" y="40" class="lbl">TL-UH</text>
    <text x="330" y="56" class="tiny">Định tuyến</text>
    <rect x="407" y="20" width="126" height="52" rx="6" class="blk memory"/>
    <text x="470" y="40" class="lbl">Main Memory</text>
    <text x="470" y="56" class="tiny">Chờ latency</text>

    <path d="M47 46 L66 46" class="link"/>
    <path d="M154 46 L176 46" class="link"/>
    <path d="M264 46 L284 46" class="link"/>
    <path d="M376 46 L407 46" class="link"/>

    <!-- Response lane -->
    <rect x="407" y="116" width="126" height="52" rx="6" class="blk memory"/>
    <text x="470" y="136" class="lbl">AccessAckData</text>
    <text x="470" y="152" class="tiny">Từ bộ nhớ</text>
    <rect x="564" y="116" width="92" height="52" rx="6" class="blk bus"/>
    <text x="610" y="136" class="lbl">TL-UH</text>
    <text x="610" y="152" class="tiny">Trả dữ liệu</text>
    <rect x="671" y="116" width="98" height="52" rx="6" class="blk memory"/>
    <text x="720" y="136" class="lbl">L2/L1D</text>
    <text x="720" y="152" class="tiny">Refill</text>
    <rect x="782" y="116" width="96" height="52" rx="6" class="blk compute"/>
    <text x="830" y="136" class="lbl">CPU</text>
    <text x="830" y="152" class="tiny">Replay</text>

    <path d="M533 142 L564 142" class="link"/>
    <path d="M656 142 L671 142" class="link"/>
    <path d="M769 142 L782 142" class="link"/>

    <!-- CPU state lane -->
    <rect x="-47" y="190" width="829" height="34" rx="6" class="stall"/>
    <text x="367.5" y="212" class="lbl">CPU stall: giữ nguyên PC trong khi chờ phản hồi</text>
    <rect x="774" y="190" width="104" height="34" rx="6" class="ok"/>
    <text x="826" y="204" class="lbl">Ghi thanh ghi</text>
    <text x="826" y="218" class="tiny">PC tiến</text>

    <path d="M470 72 L470 116" class="muted-link"/>
  </g>
</svg>
