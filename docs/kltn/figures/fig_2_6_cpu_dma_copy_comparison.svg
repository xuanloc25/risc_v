<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 610" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">So sánh luồng sao chép dữ liệu bằng CPU và DMA</title>
  <desc id="desc">CPU-copy dùng CPU để đọc từng phần tử từ nguồn rồi ghi sang đích. DMA-copy để CPU thiết lập mô tả truyền, sau đó DMA tự đọc từ nguồn và ghi sang đích trong khi CPU làm việc khác.</desc>
  <defs>
    <marker id="aEnd" markerWidth="10" markerHeight="10" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <marker id="aEndMuted" markerWidth="10" markerHeight="10" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#636e72"/>
    </marker>
  </defs>

  <text x="470" y="36" font-size="24" fill="#2d3436" font-weight="bold" text-anchor="middle">So sánh luồng sao chép dữ liệu</text>

  <!-- (a) CPU-copy -->
  <rect x="40" y="70" width="420" height="505" rx="8" fill="none" stroke="#9aa3ad" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="250" y="100" font-size="16" fill="#2d3436" font-weight="bold" text-anchor="middle">(a) CPU-copy</text>
  <text x="250" y="120" font-size="13" fill="#636e72" text-anchor="middle">CPU đọc từ nguồn rồi ghi sang đích cho từng phần tử</text>

  <rect x="155" y="150" width="190" height="72" rx="7" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
  <text x="250" y="179" font-size="16" fill="#2d3436" font-weight="bold" text-anchor="middle">CPU</text>
  <text x="250" y="199" font-size="13" fill="#636e72" text-anchor="middle">bị chiếm dụng bởi vòng lặp copy</text>

  <rect x="76" y="278" width="144" height="72" rx="7" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
  <text x="148" y="308" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Vùng nguồn</text>
  <text x="148" y="328" font-size="13" fill="#636e72" text-anchor="middle">src[i]</text>

  <rect x="280" y="278" width="144" height="72" rx="7" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
  <text x="352" y="308" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Vùng đích</text>
  <text x="352" y="328" font-size="13" fill="#636e72" text-anchor="middle">dst[i]</text>

  <rect x="126" y="236" width="34" height="24" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.2"/>
  <text x="143" y="253" font-size="13" fill="#2d3436" font-weight="bold" text-anchor="middle">1</text>
  <path d="M148 278 L250 222" stroke="#2d3436" stroke-width="2.35" fill="none" marker-end="url(#aEnd)" stroke-linecap="round"/>
  <text x="171" y="238" font-size="13" fill="#636e72" text-anchor="middle">đọc</text>

  <rect x="372" y="236" width="34" height="24" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.2"/>
  <text x="389" y="253" font-size="13" fill="#2d3436" font-weight="bold" text-anchor="middle">2</text>
  <path d="M250 222 L352 278" stroke="#2d3436" stroke-width="2.35" fill="none" marker-end="url(#aEnd)" stroke-linecap="round"/>
  <text x="329" y="238" font-size="13" fill="#636e72" text-anchor="middle">ghi</text>

  <rect x="83" y="400" width="334" height="88" rx="7" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
  <text x="250" y="425" font-size="16" fill="#2d3436" font-weight="bold" text-anchor="middle">Thời gian CPU</text>
  <g transform="translate(104 444)">
    <rect x="0" y="0" width="56" height="32" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="28" y="20" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">đọc</text>
    
    <rect x="64" y="0" width="56" height="32" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="92" y="20" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">ghi</text>
    
    <rect x="128" y="0" width="56" height="32" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="156" y="20" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">đọc</text>
    
    <rect x="192" y="0" width="56" height="32" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="220" y="20" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">ghi</text>
    
    <text x="278" y="21" font-size="16" fill="#2d3436" font-weight="bold" text-anchor="middle">...</text>
  </g>
  <text x="250" y="510" font-size="13" fill="#636e72" font-style="italic" text-anchor="middle">Dữ liệu đi qua CPU; CPU không làm việc khác trong lúc sao chép.</text>

  <!-- (b) DMA-copy -->
  <rect x="500" y="70" width="400" height="505" rx="8" fill="none" stroke="#9aa3ad" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="700" y="100" font-size="16" fill="#2d3436" font-weight="bold" text-anchor="middle">(b) DMA-copy</text>
  <text x="700" y="120" font-size="13" fill="#636e72" text-anchor="middle">CPU thiết lập mô tả truyền, DMA tự đọc–ghi dữ liệu</text>

  <rect x="530" y="146" width="134" height="68" rx="7" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
  <text x="597" y="174" font-size="16" fill="#2d3436" font-weight="bold" text-anchor="middle">CPU</text>
  <text x="597" y="194" font-size="13" fill="#636e72" text-anchor="middle">khởi tạo DMA</text>

  <rect x="530" y="250" width="134" height="68" rx="7" fill="#fdfbe0" stroke="#2d3436" stroke-width="1.5"/>
  <text x="597" y="278" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Công việc khác</text>
  <text x="597" y="298" font-size="13" fill="#636e72" text-anchor="middle">không chờ copy</text>

  <rect x="712" y="136" width="150" height="88" rx="7" fill="#efe9f5" stroke="#2d3436" stroke-width="1.5"/>
  <text x="787" y="164" font-size="16" fill="#2d3436" font-weight="bold" text-anchor="middle">Mô tả truyền</text>
  <text x="787" y="184" font-size="13" fill="#636e72" text-anchor="middle">src, dst, count</text>
  <text x="787" y="202" font-size="13" fill="#636e72" text-anchor="middle">mode / control</text>

  <rect x="712" y="262" width="150" height="74" rx="7" fill="#efe9f5" stroke="#2d3436" stroke-width="1.5"/>
  <text x="787" y="292" font-size="16" fill="#2d3436" font-weight="bold" text-anchor="middle">Bộ điều khiển DMA</text>
  <text x="787" y="312" font-size="13" fill="#636e72" text-anchor="middle">master trên bus</text>

  <rect x="536" y="390" width="140" height="64" rx="7" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
  <text x="606" y="417" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Vùng nguồn</text>
  <text x="606" y="437" font-size="13" fill="#636e72" text-anchor="middle">src buffer</text>

  <rect x="724" y="390" width="140" height="64" rx="7" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
  <text x="794" y="417" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Vùng đích</text>
  <text x="794" y="437" font-size="13" fill="#636e72" text-anchor="middle">dst buffer</text>

  <rect x="722" y="486" width="150" height="46" rx="7" fill="#fdfbe0" stroke="#2d3436" stroke-width="1.5"/>
  <text x="797" y="506" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Cờ hoàn tất</text>
  <text x="797" y="523" font-size="13" fill="#636e72" text-anchor="middle">done/status</text>

  <rect x="676" y="136" width="34" height="24" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.2"/>
  <text x="693" y="153" font-size="13" fill="#2d3436" font-weight="bold" text-anchor="middle">1</text>
  <path d="M664 180 H712" stroke="#2d3436" stroke-width="2.35" fill="none" marker-end="url(#aEnd)" stroke-linecap="round"/>
  <path d="M787 224 V262" stroke="#636e72" stroke-width="1.7" fill="none" marker-end="url(#aEndMuted)" stroke-linecap="round"/>

  <rect x="616" y="220" width="34" height="24" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.2"/>
  <text x="633" y="237" font-size="13" fill="#2d3436" font-weight="bold" text-anchor="middle">2</text>
  <path d="M597 214 V250" stroke="#636e72" stroke-width="1.7" fill="none" marker-end="url(#aEndMuted)" stroke-linecap="round"/>

  <rect x="632" y="356" width="34" height="24" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.2"/>
  <text x="649" y="373" font-size="13" fill="#2d3436" font-weight="bold" text-anchor="middle">3</text>
  <path d="M676 390 L728 336" stroke="#2d3436" stroke-width="2.8" fill="none" marker-end="url(#aEnd)" stroke-linecap="round"/>
  <path d="M787 336 V390" stroke="#2d3436" stroke-width="2.8" fill="none" marker-end="url(#aEnd)" stroke-linecap="round"/>
  <text x="691" y="409" font-size="13" fill="#636e72" text-anchor="middle">đọc</text>
  <text x="800" y="372" font-size="13" fill="#636e72" text-anchor="middle">ghi</text>

  <rect x="828" y="348" width="34" height="24" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.2"/>
  <text x="845" y="365" font-size="13" fill="#2d3436" font-weight="bold" text-anchor="middle">4</text>
  <path d="M862 299 H884 V509 H872" stroke="#2d3436" stroke-width="2.35" fill="none" marker-end="url(#aEnd)" stroke-linecap="round"/>

  <text x="700" y="552" font-size="13" fill="#636e72" font-style="italic" text-anchor="middle">Dữ liệu đi qua DMA; CPU chỉ cấu hình và kiểm tra trạng thái hoàn tất.</text>
</svg>
