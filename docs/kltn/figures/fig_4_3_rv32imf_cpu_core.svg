<svg xmlns="http://www.w3.org/2000/svg" width="6.0in" height="5.625in" viewBox="0 0 960 900" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Kiến trúc bên trong lõi xử lý RV32IMF</title>
  <desc id="desc">Sơ đồ khối lõi xử lý CPU RV32IMF với ba pha Fetch, Decode và Execute; hai tệp thanh ghi số nguyên và dấu phẩy động; các trạng thái chờ; cổng lowerPort xuống MMU, Cache, Bus; và các callback syscall ra Console/UART.</desc>

  <defs>
    <marker id="arrowEnd" markerWidth="11" markerHeight="11" refX="8.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <marker id="arrowStart" markerWidth="11" markerHeight="11" refX="0.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M9,0 L0,4.5 L9,9 Z" fill="#2d3436"/>
    </marker>
  </defs>

  <style>
    .bg{fill:#ffffff}
    .cpuShell{fill:#f8fafc;stroke:#2d3436;stroke-width:1.8}
    .blk{stroke:#2d3436;stroke-width:1.5}
    .fetch{fill:#d6e4f5}
    .decode{fill:#fcf3cf}
    .execute{fill:#e8e9fb}
    .reg{fill:#e6f4ea}
    .state{fill:#fff4e6}
    .port{fill:#eaf6ff}
    .external{fill:#f4f8fb;stroke:#2d3436;stroke-width:1.5}
    .console{fill:#fdecea;stroke:#2d3436;stroke-width:1.5}
    .labelBg{fill:#ffffff;stroke:#d4d8de;stroke-width:1}
    .flow{fill:none;stroke:#2d3436;stroke-width:1.9;marker-end:url(#arrowEnd)}
    .flowReturn{fill:none;stroke:#2d3436;stroke-width:1.9;marker-end:url(#arrowEnd)}
    .rw{fill:none;stroke:#2d3436;stroke-width:1.7;marker-start:url(#arrowStart);marker-end:url(#arrowEnd)}
    .sys{fill:none;stroke:#2d3436;stroke-width:1.55;stroke-dasharray:7 5;marker-end:url(#arrowEnd)}
    .cpuTitle{font-size:24px;fill:#1f2d3d;font-weight:800}
    .subTitle{font-size:15.5px;fill:#636e72;font-weight:700}
    .boxTitle{font-size:19px;fill:#2d3436;font-weight:800;text-anchor:middle}
    .boxSub{font-size:15.4px;fill:#2d3436;font-weight:600;text-anchor:middle}
    .boxSmall{font-size:14.2px;fill:#52616f;font-weight:650;text-anchor:middle}
    .mono{font-family:Consolas, "Courier New", monospace}
    .stateTitle{font-size:17.5px;fill:#2d3436;font-weight:800;text-anchor:middle}
    .stateText{font-size:15.3px;fill:#2d3436;font-weight:650;text-anchor:middle}
    .edgeLabel{font-size:14.6px;fill:#2d3436;font-weight:750;text-anchor:middle}
    .sysLabel{font-size:13.8px;fill:#2d3436;font-weight:750;text-anchor:middle}
    .chainText{font-size:19.5px;fill:#2d3436;font-weight:800;text-anchor:middle}
  </style>

  <rect class="bg" x="0" y="0" width="960" height="900"/>

  <!-- Main CPU boundary -->
  <rect x="40" y="70" width="700" height="600" rx="10" class="cpuShell"/>
  <text x="68" y="103" class="cpuTitle">CPU</text>
  <text x="126" y="103" class="subTitle">Lõi xử lý RV32IMF</text>

  <!-- Pipeline stages -->
  <rect x="58" y="135" width="220" height="92" rx="8" class="blk fetch"/>
  <text x="168" y="169" class="boxTitle">Fetch</text>
  <text x="168" y="194" class="boxSub mono">(readInstructionAsync)</text>

  <rect x="300" y="135" width="204" height="92" rx="8" class="blk decode"/>
  <text x="402" y="164" class="boxTitle">Decode</text>
  <text x="402" y="188" class="boxSub">giải mã opcode/funct3</text>
  <text x="402" y="209" class="boxSub">funct7 / imm</text>

  <rect x="526" y="135" width="184" height="92" rx="8" class="blk execute"/>
  <text x="618" y="169" class="boxTitle">Execute</text>
  <text x="618" y="194" class="boxSub">theo nhóm I / M / F</text>

  <path d="M278,181 L300,181" class="flow"/>
  <path d="M504,181 L526,181" class="flow"/>

  <!-- Nearby counters/state cells -->
  <rect x="58" y="252" width="220" height="52" rx="7" class="blk port"/>
  <text x="168" y="286" class="boxTitle">PC</text>

  <rect x="520" y="90" width="190" height="36" rx="7" class="blk port"/>
  <text x="615" y="114" class="boxSub mono">instructionCount</text>

  <path d="M168,252 L168,227" class="flow"/>

  <!-- Register files -->
  <rect x="76" y="346" width="292" height="92" rx="8" class="blk reg"/>
  <text x="222" y="374" class="boxTitle">Integer Register File</text>
  <text x="222" y="399" class="boxSub mono">Int32Array(32)</text>
  <text x="222" y="421" class="boxSub mono">x0–x31</text>

  <rect x="408" y="346" width="292" height="92" rx="8" class="blk reg"/>
  <text x="554" y="374" class="boxTitle">FP Register File</text>
  <text x="554" y="399" class="boxSub mono">Float32Array(32)</text>
  <text x="554" y="421" class="boxSub mono">f0–f31</text>

  <path d="M562,228 C510,278 358,318 222,346" class="rw"/>
  <path d="M670,228 C672,292 610,328 554,346" class="rw"/>
  <rect x="430" y="304" width="72" height="25" rx="5" class="labelBg"/>
  <text x="466" y="322" class="edgeLabel">đọc / ghi</text>

  <!-- Waiting/replay state -->
  <rect x="76" y="492" width="430" height="102" rx="8" class="blk state"/>
  <text x="291" y="516" class="stateTitle">Trạng thái chờ</text>
  <text x="291" y="542" class="stateText mono">fetchWaiting/fetchPending</text>
  <text x="291" y="564" class="stateText mono">waitingRequest/pendingResponse</text>
  <text x="291" y="586" class="stateText mono">replayInstruction</text>

  <!-- Syscall callbacks out of CPU -->
  <path d="M682,510 L790,510" class="sys"/>
  <path d="M675,546 L790,546" class="sys"/>
  <path d="M678,582 L790,582" class="sys"/>

  <rect x="532" y="495" width="150" height="24" rx="5" class="labelBg"/>
  <text x="607" y="512" class="sysLabel mono">onSyscallOutput</text>
  <rect x="545" y="531" width="130" height="24" rx="5" class="labelBg"/>
  <text x="610" y="548" class="sysLabel mono">onSyscallExit</text>
  <rect x="538" y="567" width="140" height="24" rx="5" class="labelBg"/>
  <text x="608" y="584" class="sysLabel mono">onSyscallError</text>

  <rect x="790" y="474" width="130" height="136" rx="8" class="console"/>
  <text x="855" y="532" class="boxTitle">Console</text>
  <text x="855" y="558" class="boxTitle">UART</text>

  <!-- lowerPort and memory hierarchy connection -->
  <rect x="408" y="612" width="160" height="42" rx="7" class="blk port"/>
  <text x="488" y="638" class="boxTitle mono">lowerPort</text>

  <path d="M448,654 L448,768" class="flow"/>
  <path d="M528,768 L528,654" class="flowReturn"/>

  <rect x="170" y="700" width="250" height="48" rx="6" class="labelBg"/>
  <text x="295" y="718" class="edgeLabel mono">sendRequest</text>
  <text x="295" y="739" class="edgeLabel">(Get/Put/Arithmetic)</text>

  <rect x="560" y="700" width="270" height="48" rx="6" class="labelBg"/>
  <text x="695" y="718" class="edgeLabel mono">receiveResponse</text>
  <text x="695" y="739" class="edgeLabel">(AccessAck/AccessAckData)</text>

  <!-- External memory path -->
  <rect x="220" y="768" width="520" height="74" rx="9" class="external"/>
  <rect x="246" y="790" width="130" height="34" rx="6" class="blk port"/>
  <text x="311" y="813" class="chainText">MMU</text>
  <rect x="416" y="790" width="130" height="34" rx="6" class="blk port"/>
  <text x="481" y="813" class="chainText">Cache</text>
  <rect x="586" y="790" width="130" height="34" rx="6" class="blk port"/>
  <text x="651" y="813" class="chainText">Bus</text>
  <path d="M376,807 L416,807" class="flow"/>
  <path d="M546,807 L586,807" class="flow"/>
</svg>
