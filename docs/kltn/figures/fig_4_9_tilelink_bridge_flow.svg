<svg xmlns="http://www.w3.org/2000/svg" width="6.0in" height="4.8in" viewBox="0 0 960 768" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Luồng giao dịch qua cầu nối UH-UL</title>
  <desc id="desc">Sơ đồ luồng giao dịch đi qua cầu nối giữa bus TileLink-UH và TileLink-UL, minh họa cơ chế Slave/Master và truy cập trực tiếp bus hạ nguồn.</desc>

  <defs>
    <!-- Mũi tên mặc định -->
    <marker id="arrowEnd" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <!-- Mũi tên Bypass trực tiếp - Màu cam -->
    <marker id="arrowBypass" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#e8590c"/>
    </marker>
  </defs>

  <style>
    .bg { fill:#ffffff; }
    .box { stroke:#2d3436; stroke-width:2.0; stroke-linejoin:round; }
    
    /* Thanh Bus */
    .busUH { fill:#eaf6ff; }       /* Xanh dương nhạt */
    .busUL { fill:#e6f4ea; }       /* Xanh lá nhạt */
    
    /* Khối cầu nối */
    .bridge { fill:#fdfbe0; }      /* Vàng nhạt */
    
    /* Khung con bên trong */
    .innerBox { fill:#ffffff; stroke:#2d3436; stroke-width:1.5; rx:6px; }
    .diamond { fill:#ffffff; stroke:#2d3436; stroke-width:1.8; }
    .noteBox { fill:#fff9db; stroke:#e8590c; stroke-width:1.5; stroke-dasharray:6 4; rx:8px; }
    
    /* Đường nối và mũi tên */
    .pathNormal { fill:none; stroke:#2d3436; stroke-width:2.5; marker-end:url(#arrowEnd); }
    .pathBypass { fill:none; stroke:#e8590c; stroke-width:2.8; stroke-dasharray:7 4; marker-end:url(#arrowBypass); }
    .pathConnect { fill:none; stroke:#2d3436; stroke-width:2.2; }
    
    /* Văn bản (Cỡ chữ to rõ để in ấn) */
    .titleText { font-size:24px; fill:#2d3436; font-weight:850; text-anchor:middle; }
    .bodyText { font-size:18px; fill:#2d3436; font-weight:750; text-anchor:middle; }
    .italicText { font-size:15px; fill:#52616f; font-weight:750; font-style:italic; text-anchor:middle; }
    .labelText { font-size:15px; fill:#2d3436; font-weight:800; text-anchor:middle; }
    .mono { font-family:Consolas, "Courier New", monospace; }
    
    /* Nhãn trên đường truyền */
    .labelNormal { font-size:16px; fill:#2d3436; font-weight:850; }
    .labelBypass { font-size:14px; fill:#e8590c; font-weight:850; }
    .smallLabel { font-size:14px; fill:#2d3436; font-weight:850; text-anchor:middle; }
  </style>

  <!-- Nền trắng toàn cục -->
  <rect class="bg" x="0" y="0" width="960" height="768"/>

  <!-- ==================== BUS TILELINK-UH (BÊN TRÁI - Dịch sang trái 10px, hẹp đi 10px) ==================== -->
  <rect x="30" y="60" width="90" height="630" rx="8" class="box busUH"/>
  <text x="75" y="375" class="titleText" transform="rotate(-90, 75, 375)">TileLink-UH Bus</text>

  <!-- ==================== BUS TILELINK-UL (BÊN PHẢI - Dịch sang phải 20px, hẹp đi 10px) ==================== -->
  <rect x="840" y="60" width="90" height="630" rx="8" class="box busUL"/>
  <text x="885" y="375" class="titleText" transform="rotate(-90, 885, 375)">TileLink-UL Bus</text>

  <!-- ==================== CẦU NỐI TRÊN: BRIDGE UH -> UL ==================== -->
  <rect x="200" y="80" width="560" height="300" rx="12" class="box bridge"/>
  <!-- Căn giữa tiêu đề chính xác tại x=480 -->
  <text x="480" y="115" class="titleText">Bridge UH → UL</text>

  <!-- Nhận yêu cầu và rẽ nhánh bên trong Bridge UH -> UL -->
  <rect x="230" y="210" width="140" height="50" class="innerBox"/>
  <text x="300" y="241" class="bodyText mono" font-weight="bold">receiveReq</text>

  <path d="M 440,205 L 485,235 L 440,265 L 395,235 Z" class="diamond"/>
  <text x="440" y="241" class="labelText">Loại?</text>

  <path d="M 370,235 H 395" class="pathNormal"/>

  <!-- Nhánh Đọc (Read) - Đường đi vào ở y=160 -->
  <path d="M 440,205 V 160 H 580" class="pathNormal"/>
  <text x="510" y="152" class="labelNormal" text-anchor="middle">Đọc</text>
  <rect x="580" y="145" width="160" height="50" class="innerBox"/>
  <text x="660" y="176" class="bodyText mono" font-weight="bold">directRead</text>
  
  <!-- Đường truy cập trực tiếp bus ở giữa hộp y=170 -> Chạy thẳng tới x=840 -->
  <path d="M 740,170 H 840" class="pathBypass"/>

  <!-- Nhánh Ghi (Write) - Đường đi vào ở y=225 (Ghi căn lề thẳng hàng với Đọc) -->
  <path d="M 485,235 V 225 H 580" class="pathNormal"/>
  <text x="510" y="217" class="labelNormal" text-anchor="middle">Ghi</text>
  <rect x="580" y="210" width="160" height="50" class="innerBox"/>
  <text x="660" y="241" class="bodyText mono" font-weight="bold">directWrite</text>
  
  <!-- Đường truy cập trực tiếp bus ở giữa hộp y=235 -> Chạy thẳng tới x=840 -->
  <path d="M 740,235 H 840" class="pathBypass"/>

  <!-- Nhánh Nguyên tử (Atomic) - Đường đi vào ở y=290 -->
  <path d="M 440,265 V 290 H 580" class="pathNormal"/>
  <text x="510" y="282" class="labelNormal" text-anchor="middle">Atomics</text>
  <rect x="580" y="275" width="160" height="85" class="innerBox"/>
  <text x="660" y="303" class="labelText mono" font-weight="bold">directRead</text>
  <text x="660" y="323" class="labelText mono" font-weight="bold">→ applyAtomic</text>
  <text x="660" y="343" class="labelText mono" font-weight="bold">→ directWrite(UL)</text>
  
  <!-- Đường truy cập trực tiếp bus ở giữa hộp y=318 -> Chạy thẳng tới x=840 -->
  <path d="M 740,318 H 840" class="pathBypass"/>

  <!-- Ghép luồng kết quả về Sinh phản hồi (Các đường đi ra tách biệt ở y=180, y=245, y=340) -->
  <path d="M 580,180 H 560" class="pathConnect"/>
  <path d="M 580,245 H 560" class="pathConnect"/>
  <path d="M 580,340 H 560" class="pathConnect"/>
  <path d="M 560,180 V 340 H 410" class="pathNormal"/>

  <rect x="230" y="310" width="180" height="60" class="innerBox"/>
  <text x="320" y="335" class="bodyText" font-weight="bold">Sinh phản hồi</text>
  <text x="320" y="357" class="labelText mono">AccessAck(Data)</text>

  <!-- Đường nối ngoại vi của Bridge UH -> UL (Chỉ còn (A) và (D)) -->
  <path d="M 120,235 H 230" class="pathNormal"/>
  <text x="175" y="220" class="smallLabel">(A)</text>

  <path d="M 230,340 H 120" class="pathNormal"/>
  <text x="175" y="330" class="smallLabel">(D)</text>


  <!-- ==================== CẦU NỐI DƯỚI: BRIDGE UL -> UH ==================== -->
  <rect x="200" y="400" width="560" height="300" rx="12" class="box bridge"/>
  <!-- Căn giữa tiêu đề chính xác tại x=480 -->
  <text x="480" y="435" class="titleText">Bridge UL → UH</text>

  <!-- Nhận yêu cầu và rẽ nhánh bên trong Bridge UL -> UH -->
  <rect x="590" y="530" width="140" height="50" class="innerBox"/>
  <text x="660" y="561" class="bodyText mono" font-weight="bold">receiveReq</text>

  <path d="M 520,525 L 565,555 L 520,585 L 475,555 Z" class="diamond"/>
  <text x="520" y="561" class="labelText">Loại?</text>

  <path d="M 590,555 H 565" class="pathNormal"/>

  <!-- Nhánh Đọc (Read) - Đường đi vào ở y=480 -->
  <path d="M 520,525 V 480 H 380" class="pathNormal"/>
  <text x="450" y="472" class="labelNormal" text-anchor="middle">Đọc</text>
  <rect x="220" y="465" width="160" height="50" class="innerBox"/>
  <text x="300" y="496" class="bodyText mono" font-weight="bold">directRead</text>
  
  <!-- Đường truy cập trực tiếp bus ở giữa hộp y=490 -> Chạy thẳng tới x=120 -->
  <path d="M 220,490 H 120" class="pathBypass"/>

  <!-- Nhánh Ghi (Write) - Đường đi vào ở y=545 (Ghi căn lề thẳng hàng với Đọc) -->
  <path d="M 475,555 V 545 H 380" class="pathNormal"/>
  <text x="450" y="537" class="labelNormal" text-anchor="middle">Ghi</text>
  <rect x="220" y="530" width="160" height="50" class="innerBox"/>
  <text x="300" y="561" class="bodyText mono" font-weight="bold">directWrite</text>
  
  <!-- Đường truy cập trực tiếp bus ở giữa hộp y=555 -> Chạy thẳng tới x=120 -->
  <path d="M 220,555 H 120" class="pathBypass"/>

  <!-- Ghép luồng kết quả về Sinh phản hồi (Các đường đi ra tách biệt ở y=500 và y=565) -->
  <path d="M 380,500 H 400" class="pathConnect"/>
  <path d="M 380,565 H 400" class="pathConnect"/>
  <path d="M 400,500 V 640 H 550" class="pathNormal"/>

  <rect x="550" y="610" width="180" height="60" class="innerBox"/>
  <text x="640" y="635" class="bodyText" font-weight="bold">Sinh phản hồi</text>
  <text x="640" y="657" class="labelText mono">AccessAck(Data)</text>

  <!-- Đường nối ngoại vi của Bridge UL -> UH (Chỉ còn (A) và (D)) -->
  <path d="M 840,555 H 730" class="pathNormal"/>
  <text x="785" y="540" class="smallLabel">(A)</text>

  <path d="M 730,640 H 840" class="pathNormal"/>
  <text x="785" y="630" class="smallLabel">(D)</text>


  <!-- ==================== KHUNG GHI CHÚ DƯỚI CÙNG ==================== -->
  <rect x="200" y="715" width="560" height="40" class="noteBox"/>
  <text x="480" y="740" class="labelText" fill="#e8590c" font-weight="bold">Cầu nối là slave trên bus thượng nguồn, truy cập trực tiếp bus hạ nguồn.</text>
</svg>
