<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 490" role="img" aria-labelledby="title desc">
  <title id="title">RV32I instruction formats</title>
  <desc id="desc">Six 32-bit RV32I instruction formats: R, I, S, B, U, and J.</desc>

