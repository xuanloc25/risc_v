<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 540" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Mô hình giao dịch TileLink trên hai kênh A và D</title>
  <desc id="desc">Master phát yêu cầu trên kênh A, gồm opcode, địa chỉ, mặt nạ và dữ liệu. Slave xử lý yêu cầu và trả phản hồi trên kênh D, gồm opcode và dữ liệu.</desc>
  <defs>
    <marker id="aEnd" markerWidth="10" markerHeight="10" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
  </defs>

  <text x="470" y="38" font-size="24" fill="#2d3436" font-weight="bold" text-anchor="middle">Mô hình giao dịch TileLink trên hai kênh A và D</text>

  <!-- Master -->
  <rect x="50" y="145" width="190" height="270" rx="8" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
  <text x="145" y="178" font-size="17" fill="#2d3436" font-weight="bold" text-anchor="middle">Master</text>
  <text x="145" y="198" font-size="13" fill="#636e72" text-anchor="middle">thành phần khởi tạo giao dịch</text>
  
  <rect x="78" y="226" width="134" height="44" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.1"/>
  <text x="145" y="253" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">CPU</text>
  
  <rect x="78" y="286" width="134" height="44" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.1"/>
  <text x="145" y="313" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">DMA</text>
  
  <rect x="78" y="356" width="134" height="34" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.1"/>
  <text x="145" y="378" font-size="13" fill="#636e72" text-anchor="middle">nhận phản hồi D</text>

  <!-- TileLink bus group -->
  <rect x="260" y="105" width="425" height="355" rx="8" fill="none" stroke="#9aa3ad" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="472" y="130" font-size="17" fill="#2d3436" font-weight="bold" text-anchor="middle">Bus TileLink</text>
  <text x="472" y="150" font-size="13" fill="#636e72" text-anchor="middle">TL-UL/TL-UH sử dụng hai kênh một chiều: A và D</text>

  <!-- Channel A -->
  <rect x="276" y="168" width="393" height="102" rx="7" fill="#efe9f5" stroke="#2d3436" stroke-width="1.5"/>
  <rect x="294" y="184" width="36" height="24" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.1"/>
  <text x="312" y="201" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">A</text>
  <text x="472" y="203" font-size="17" fill="#2d3436" font-weight="bold" text-anchor="middle">Yêu cầu: Master → Slave</text>

  <g transform="translate(294 218)">
    <rect x="0" y="0" width="78" height="36" rx="5" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
    <text x="39" y="16" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">opcode</text>
    <text x="39" y="30" font-size="13" fill="#636e72" text-anchor="middle">loại thao tác</text>
    
    <rect x="86" y="0" width="118" height="36" rx="5" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
    <text x="145" y="16" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">địa chỉ</text>
    <text x="145" y="30" font-size="13" fill="#636e72" text-anchor="middle">đích truy cập</text>
    
    <rect x="212" y="0" width="74" height="36" rx="5" fill="#efe9f5" stroke="#2d3436" stroke-width="1.5"/>
    <text x="249" y="16" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">mặt nạ</text>
    <text x="249" y="30" font-size="13" fill="#636e72" text-anchor="middle">byte mask</text>
    
    <rect x="294" y="0" width="82" height="36" rx="5" fill="#fdfbe0" stroke="#2d3436" stroke-width="1.5"/>
    <text x="335" y="16" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">dữ liệu</text>
    <text x="335" y="30" font-size="13" fill="#636e72" text-anchor="middle">ghi nếu có</text>
  </g>

  <!-- Rerouted Channel A flow line -->
  <path d="M145 145 V75 H795 V145" stroke="#2d3436" stroke-width="2.6" fill="none" marker-end="url(#aEnd)" stroke-linecap="round"/>

  <!-- Channel D -->
  <rect x="276" y="300" width="393" height="116" rx="7" fill="#fdfbe0" stroke="#2d3436" stroke-width="1.5"/>
  <rect x="294" y="318" width="36" height="24" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.1"/>
  <text x="312" y="335" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">D</text>
  <text x="472" y="337" font-size="17" fill="#2d3436" font-weight="bold" text-anchor="middle">Phản hồi: Slave → Master</text>

  <g transform="translate(356 360)">
    <rect x="0" y="0" width="112" height="34" rx="5" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
    <text x="56" y="15" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">opcode</text>
    <text x="56" y="29" font-size="13" fill="#636e72" text-anchor="middle">Ack / AccessAck</text>
    
    <rect x="128" y="0" width="140" height="34" rx="5" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
    <text x="198" y="15" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">dữ liệu</text>
    <text x="198" y="29" font-size="13" fill="#636e72" text-anchor="middle">trả về nếu đọc</text>
  </g>

  <!-- Rerouted Channel D flow line -->
  <path d="M795 415 V485 H145 V415" stroke="#2d3436" stroke-width="2.6" fill="none" marker-end="url(#aEnd)" stroke-linecap="round"/>

  <!-- Slave -->
  <rect x="700" y="145" width="190" height="270" rx="8" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
  <text x="795" y="178" font-size="17" fill="#2d3436" font-weight="bold" text-anchor="middle">Slave</text>
  <text x="795" y="198" font-size="13" fill="#636e72" text-anchor="middle">thành phần phục vụ yêu cầu</text>
  
  <rect x="728" y="224" width="134" height="40" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.1"/>
  <text x="795" y="249" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Bộ nhớ</text>
  
  <rect x="728" y="278" width="134" height="40" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.1"/>
  <text x="795" y="303" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Thiết bị MMIO</text>
  
  <rect x="728" y="338" width="134" height="50" rx="5" fill="#ffffff" stroke="#2d3436" stroke-width="1.1"/>
  <text x="795" y="358" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Xử lý yêu cầu</text>
  <text x="795" y="375" font-size="13" fill="#636e72" text-anchor="middle">đọc / ghi / tạo phản hồi</text>

  <!-- Note -->
  <text x="470" y="505" font-size="14" fill="#636e72" font-style="italic" text-anchor="middle">
    Kênh A khởi tạo giao dịch; kênh D hoàn tất giao dịch bằng phản hồi tương ứng cho yêu cầu đó.
  </text>
</svg>
