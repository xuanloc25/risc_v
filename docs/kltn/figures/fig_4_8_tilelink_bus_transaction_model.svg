<svg xmlns="http://www.w3.org/2000/svg" width="6.0in" height="4.75in" viewBox="0 0 960 760" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Cấu trúc TileLinkBase và mô hình giao dịch</title>
  <desc id="desc">Sơ đồ TileLinkBase với sổ đăng ký master, requestQueue, inFlight, responseQueue, danh sách slave, đường định tuyến phản hồi về master và móc onTraceTransaction tới khối trực quan hóa.</desc>

  <defs>
    <marker id="arrowEnd" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <marker id="blueArrowEnd" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#0b7285"/>
    </marker>
    <marker id="traceArrowEnd" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#7b3f98"/>
    </marker>
  </defs>

  <style>
    .bg{fill:#ffffff}
    .panel{fill:#f8fafc;stroke:#2d3436;stroke-width:1.7}
    .masterPanel{fill:#eaf6ff;stroke:#2d3436;stroke-width:1.6}
    .slavePanel{fill:#eef7ef;stroke:#2d3436;stroke-width:1.6}
    .basePanel{fill:#fbfcfe;stroke:#2d3436;stroke-width:1.8}
    .queue{fill:#efe9f5;stroke:#2d3436;stroke-width:1.45}
    .flight{fill:#fff4c2;stroke:#2d3436;stroke-width:1.55}
    .response{fill:#fff7df;stroke:#2d3436;stroke-width:1.45}
    .masterBox{fill:#ffffff;stroke:#2d3436;stroke-width:1.25}
    .slaveBox{fill:#ffffff;stroke:#2d3436;stroke-width:1.25}
    .traceBox{fill:#f7f2fb;stroke:#7b3f98;stroke-width:1.4}
    .labelBg{fill:#ffffff;stroke:#d4d8de;stroke-width:1.05}
    .noteBox{fill:#f8fafc;stroke:#9aa3ad;stroke-width:1.2;stroke-dasharray:7 5}
    .req{fill:none;stroke:#2d3436;stroke-width:2.1;marker-end:url(#arrowEnd);stroke-linecap:round;stroke-linejoin:round}
    .reqThin{fill:none;stroke:#2d3436;stroke-width:1.85;marker-end:url(#arrowEnd);stroke-linecap:round;stroke-linejoin:round}
    .resp{fill:none;stroke:#0b7285;stroke-width:2.05;marker-end:url(#blueArrowEnd);stroke-linecap:round;stroke-linejoin:round}
    .trace{fill:none;stroke:#7b3f98;stroke-width:1.9;stroke-dasharray:8 6;marker-end:url(#traceArrowEnd);stroke-linecap:round;stroke-linejoin:round}
    .titleText{font-size:21px;fill:#2d3436;font-weight:850;text-anchor:middle}
    .sectionTitle{font-size:17.5px;fill:#2d3436;font-weight:850;text-anchor:middle}
    .boxTitle{font-size:17px;fill:#2d3436;font-weight:850;text-anchor:middle}
    .boxSub{font-size:13.5px;fill:#52616f;font-weight:700;text-anchor:middle}
    .small{font-size:12.5px;fill:#52616f;font-weight:700;text-anchor:middle}
    .label{font-size:14.2px;fill:#2d3436;font-weight:800;text-anchor:middle}
    .labelBlue{font-size:14.2px;fill:#0b7285;font-weight:850;text-anchor:middle}
    .labelTrace{font-size:13.8px;fill:#7b3f98;font-weight:850;text-anchor:middle}
    .note{font-size:16px;fill:#2d3436;font-weight:850;text-anchor:middle}
    .mono{font-family:Consolas, "Courier New", monospace}
  </style>

  <rect class="bg" x="0" y="0" width="960" height="760"/>

  <!-- Master registry -->
  <rect x="230" y="30" width="500" height="112" rx="10" class="masterPanel"/>
  <text x="480" y="60" class="sectionTitle">Danh sách master</text>
  <rect x="278" y="78" width="150" height="46" rx="7" class="masterBox"/>
  <text x="353" y="105" class="boxTitle">CPU</text>
  <text x="353" y="120" class="boxSub">(qua L2)</text>
  <rect x="532" y="78" width="150" height="46" rx="7" class="masterBox"/>
  <text x="607" y="106" class="boxTitle">DMA</text>

  <!-- TileLinkBase -->
  <rect x="230" y="166" width="500" height="388" rx="12" class="basePanel"/>
  <text x="480" y="198" class="titleText">TileLinkBase</text>

  <rect x="335" y="226" width="290" height="58" rx="8" class="queue"/>
  <text x="480" y="250" class="boxTitle mono">requestQueue</text>
  <text x="480" y="272" class="boxSub">hàng đợi yêu cầu</text>

  <rect x="365" y="344" width="230" height="58" rx="8" class="flight"/>
  <text x="480" y="368" class="boxTitle mono">inFlight</text>
  <text x="480" y="390" class="boxSub">1 giao dịch</text>

  <rect x="335" y="462" width="290" height="58" rx="8" class="response"/>
  <text x="480" y="486" class="boxTitle mono">responseQueue</text>
  <text x="480" y="508" class="boxSub">hàng đợi phản hồi</text>

  <!-- Request path from masters -->
  <path d="M353,124 V210 H430 V226" class="reqThin"/>
  <path d="M607,124 V210 H530 V226" class="reqThin"/>

  <!-- Internal request validation -->
  <path d="M480,284 V344" class="req"/>
  <rect x="350" y="294" width="260" height="30" rx="7" class="labelBg"/>
  <text x="480" y="315" class="label">Kiểm tra opcode hợp lệ</text>

  <!-- Select one slave by address -->
  <path d="M595,373 H681 V410" class="reqThin"/>
  <path d="M681,440 V606" class="reqThin"/>
  <rect x="622" y="410" width="118" height="30" rx="7" class="labelBg"/>
  <text x="681" y="431" class="label mono">match(address)</text>

  <!-- Response path -->
  <path d="M130,645 H92 V501 H335" class="resp"/>
  <rect x="36" y="535" width="190" height="30" rx="7" class="labelBg"/>
  <text x="131" y="556" class="labelBlue">Slave → responseQueue</text>

  <path d="M335,481 H188 V94 H230" class="resp"/>
  <rect x="82" y="292" width="214" height="30" rx="7" class="labelBg"/>
  <text x="189" y="313" class="labelBlue">Định tuyến theo tên đích</text>

  <!-- Trace hook -->
  <path d="M730,334 H770" class="trace"/>
  <rect x="770" y="312" width="150" height="92" rx="9" class="traceBox"/>
  <text x="845" y="344" class="boxTitle">Trực quan hóa</text>
  <text x="845" y="368" class="boxSub">Ghi nhận yêu cầu</text>
  <text x="845" y="388" class="boxSub">và phản hồi</text>
  <rect x="744" y="276" width="178" height="30" rx="7" class="labelBg"/>
  <text x="833" y="297" class="labelTrace mono">onTraceTransaction</text>

  <!-- Slave list -->
  <rect x="130" y="606" width="700" height="102" rx="10" class="slavePanel"/>
  <text x="480" y="632" class="sectionTitle">Danh sách slave</text>

  <rect x="158" y="652" width="188" height="42" rx="7" class="slaveBox"/>
  <text x="252" y="670" class="boxTitle">Main Memory</text>
  <text x="252" y="689" class="small">!MMIO và !DMA Regs</text>

  <rect x="386" y="652" width="188" height="42" rx="7" class="slaveBox"/>
  <text x="480" y="670" class="boxTitle">DMA Regs</text>
  <text x="480" y="689" class="small mono">0xFFED0000–0007</text>

  <rect x="614" y="652" width="188" height="42" rx="7" class="slaveBox"/>
  <text x="708" y="670" class="boxTitle">Bridge→UL</text>
  <text x="708" y="689" class="small">Địa chỉ ngoại vi UL</text>

  <!-- Emphasis note -->
  <rect x="312" y="722" width="336" height="28" rx="7" class="noteBox"/>
  <text x="480" y="742" class="note">Một giao dịch in-flight tại một thời điểm</text>
</svg>
