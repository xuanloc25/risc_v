<svg xmlns="http://www.w3.org/2000/svg" width="6.0in" height="8.0in" viewBox="0 0 960 1280" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Sơ đồ hoạt động của trình biên dịch hai lượt</title>
  <desc id="desc">Sơ đồ mô tả trình biên dịch hợp ngữ hai lượt: lượt 1 tách chú thích, nhãn, phân tích mnemonic và toán hạng, xử lý directive hoặc tính kích thước lệnh để tạo bảng nhãn và bố trí địa chỉ; lượt 2 duyệt dòng lệnh, khai triển lệnh giả hoặc mã hóa lệnh thật, ghi little-endian vào bộ nhớ và đóng gói kết quả. Cả hai lượt có nhánh báo lỗi theo dòng khi gặp ngoại lệ.</desc>

  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <marker id="arrowRed" markerWidth="11" markerHeight="11" refX="8.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <style>
    .panel{fill:none;stroke:#9aa3ad;stroke-width:1.4;stroke-dasharray:6 4}
    .blk{stroke:#2d3436;stroke-width:1.5}
    .source{fill:#d6e4f5}
    .proc{fill:#eef2fb}
    .directive{fill:#e6f4ea}
    .instr{fill:#e8e9fb}
    .out{fill:#eaf6ff}
    .dec{fill:#fcf3cf}
    .err{fill:#fdecea}
    .flow{fill:none;stroke:#2d3436;stroke-width:1.7;marker-end:url(#arrow)}
    .loop{fill:none;stroke:#636e72;stroke-width:1.5;stroke-dasharray:6 4;marker-end:url(#arrow)}
    .errflow{fill:none;stroke:#c0392b;stroke-width:1.7;stroke-dasharray:7 4;marker-end:url(#arrowRed)}
    .titleText{font-size:18px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .panelTitle{font-size:18.8px;fill:#1f2d3d;font-weight:700;text-anchor:middle}
    .lbl{font-size:16.4px;fill:#2d3436;font-weight:650;text-anchor:middle}
    .lbl2{font-size:14.4px;fill:#2d3436;font-weight:500;text-anchor:middle}
    .small{font-size:13.4px;fill:#636e72;font-weight:600;text-anchor:middle}
    .edgeLabel{font-size:15px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .errLabel{font-size:16.5px;fill:#c0392b;font-weight:800;text-anchor:middle}
    .handlerNote{font-size:14.4px;fill:#2d3436;font-weight:650;text-anchor:middle}
    .legendText{font-size:13.5px;fill:#636e72;font-weight:700;text-anchor:start}
    .code{font-family:Consolas, "Courier New", monospace}
    .tag{fill:#ffffff;stroke:#d4d8de;stroke-width:1}
    .white{fill:#ffffff;opacity:0.92}
  </style>

  <rect x="0" y="0" width="960" height="1280" fill="#ffffff"/>

  <!-- ================= EDGES ================= -->
  <path d="M400,97 L400,126" class="flow"/>
  <path d="M400,198 L400,214" class="flow"/>
  <path d="M400,262 L400,274" class="flow"/>
  <path d="M400,350 L400,374" class="flow"/>
  <path d="M400,426 L400,450" class="flow"/>
  <path d="M400,496 L400,526" class="flow"/>
  <path d="M400,571 L400,618" class="flow"/>
  <path d="M400,662 L400,730" class="flow"/>
  <path d="M400,774 L400,792" class="flow"/>
  <path d="M400,1014 L400,1036" class="flow"/>
  <path d="M400,1080 L400,1102" class="flow"/>
  <path d="M400,1154 L400,1188" class="flow"/>

  <!-- Pass 1 decision branches -->
  <path d="M468,312 L516,312" class="flow"/>
  <path d="M609,340 C609,520 535,548 500,548" class="flow"/>

  <!-- Pass 1 loop to next line -->
  <path d="M253,548 C124,548 112,176 245,176" class="loop"/>

  <!-- Pass 2 decision branches -->
  <path d="M333,830 L188,830 L188,887" class="flow"/>
  <path d="M467,830 L598,830 L598,887" class="flow"/>
  <path d="M188,939 L188,989 L255,989" class="flow"/>
  <path d="M598,939 L598,989 L545,989" class="flow"/>

  <!-- Error branches from both passes -->
  <path d="M702,346 C790,390 840,474 840,571" class="errflow"/>
  <path d="M710,850 C805,805 840,735 840,647" class="errflow"/>

  <!-- ================= EDGE LABELS ================= -->
  <text x="504" y="306" class="edgeLabel">CÓ</text>
  <text x="436" y="369" class="edgeLabel">KHÔNG</text>

  <text x="266" y="820" class="edgeLabel">CÓ</text>
  <text x="519" y="820" class="edgeLabel">KHÔNG</text>

  <text x="146" y="370" class="small" transform="rotate(-90 146 370)">dòng tiếp theo</text>
  <text x="842" y="452" class="errLabel" transform="rotate(62 842 452)">ngoại lệ</text>
  <text x="858" y="756" class="errLabel" transform="rotate(-62 858 756)">ngoại lệ</text>

  <!-- ================= NODES ================= -->
  <!-- Source -->
  <rect x="230" y="54" width="340" height="43" rx="21" class="blk source"/>
  <text x="400" y="81" class="lbl">Mã nguồn hợp ngữ</text>

  <!-- Pass 1 panel -->
  <rect x="58" y="126" width="652" height="468" rx="9" class="panel"/>
  <rect x="274" y="112" width="252" height="30" rx="15" class="blk proc"/>
  <text x="400" y="133" class="panelTitle">Lượt 1: <tspan class="code">_pass1</tspan></text>

  <rect x="245" y="154" width="310" height="44" rx="7" class="blk proc"/>
  <text x="400" y="181" class="lbl">Tách chú thích / nhãn</text>

  <rect x="245" y="214" width="310" height="48" rx="7" class="blk proc"/>
  <text x="400" y="244" class="lbl">Phân tích mnemonic</text>

  <polygon points="400,274 468,312 400,350 332,312" class="blk dec"/>
  <text x="400" y="316" class="lbl">Là chỉ thị?</text>

  <rect x="516" y="284" width="186" height="56" rx="7" class="blk directive"/>
  <text x="609" y="306" class="lbl">Gọi handler directive</text>
  <text x="609" y="328" class="handlerNote">section / địa chỉ / dữ liệu</text>

  <rect x="235" y="374" width="330" height="52" rx="7" class="blk instr"/>
  <text x="400" y="406" class="lbl">Tính kích thước lệnh</text>

  <rect x="275" y="450" width="250" height="46" rx="7" class="blk instr"/>
  <text x="400" y="478" class="lbl code">currentAddress += size</text>

  <rect x="253" y="526" width="294" height="45" rx="7" class="blk proc"/>
  <text x="400" y="553" class="lbl">Ghi nhãn &amp; <tspan class="code">lineInfo</tspan></text>

  <rect x="180" y="618" width="440" height="44" rx="8" class="blk out"/>
  <text x="400" y="636" class="lbl">Bảng nhãn + danh sách dòng</text>
  <text x="400" y="652" class="lbl2">+ bố trí địa chỉ</text>

  <!-- Error box -->
  <rect x="760" y="571" width="160" height="76" rx="8" class="blk err"/>
  <text x="840" y="604" class="lbl">Báo lỗi</text>
  <text x="840" y="625" class="lbl">theo dòng</text>

  <!-- Pass 2 panel -->
  <rect x="58" y="697" width="652" height="385" rx="9" class="panel"/>
  <rect x="274" y="683" width="252" height="30" rx="15" class="blk proc"/>
  <text x="400" y="704" class="panelTitle">Lượt 2: <tspan class="code">_pass2</tspan></text>

  <rect x="245" y="730" width="310" height="48" rx="7" class="blk proc"/>
  <text x="400" y="751" class="lbl">Duyệt từng dòng lệnh</text>
  <text x="400" y="767" class="lbl2">bỏ qua dòng không phải lệnh</text>

  <polygon points="400,792 467,830 400,868 333,830" class="blk dec"/>
  <text x="400" y="834" class="lbl">Lệnh giả?</text>

  <rect x="70" y="887" width="236" height="52" rx="7" class="blk directive"/>
  <text x="188" y="906" class="lbl code">_expandAndEncodePseudo</text>
  <text x="188" y="924" class="lbl2">khai triển → lệnh thật</text>

  <rect x="490" y="887" width="216" height="52" rx="7" class="blk instr"/>
  <text x="598" y="916" class="lbl code">_encodeInstruction</text>

  <rect x="255" y="964" width="290" height="50" rx="7" class="blk proc"/>
  <text x="400" y="984" class="lbl">Ghi little-endian</text>
  <text x="400" y="1001" class="lbl2">vào ảnh bộ nhớ</text>

  <rect x="260" y="1036" width="280" height="44" rx="7" class="blk proc"/>
  <text x="400" y="1063" class="lbl">Thêm vào <tspan class="code">binaryCode</tspan></text>

  <!-- Final packaging -->
  <rect x="180" y="1102" width="440" height="52" rx="8" class="blk out"/>
  <text x="400" y="1123" class="lbl">Xác định <tspan class="code">startAddress</tspan></text>
  <text x="400" y="1140" class="lbl2"><tspan class="code">_start</tspan> hoặc lệnh đầu <tspan class="code">.text</tspan></text>

  <rect x="192" y="1188" width="416" height="48" rx="24" class="blk source"/>
  <text x="400" y="1208" class="lbl">Gói kết quả</text>
  <text x="400" y="1226" class="lbl2 code">{memory, startAddress, instructions}</text>

  <!-- Legend -->
  <rect x="76" y="1246" width="808" height="28" rx="6" class="tag"/>
  <rect x="106" y="1256" width="30" height="9" rx="2" class="blk proc"/>
  <text x="180" y="1265" class="legendText">xử lý</text>
  <polygon points="290,1254 304,1260.5 290,1267 276,1260.5" class="blk dec"/>
  <text x="346" y="1265" class="legendText">quyết định</text>
  <line x1="446" y1="1260.5" x2="486" y2="1260.5" class="errflow"/>
  <text x="500" y="1265" class="legendText">ngoại lệ → báo lỗi theo dòng</text>
  <line x1="690" y1="1260.5" x2="734" y2="1260.5" class="loop"/>
  <text x="748" y="1265" class="legendText">lặp qua từng dòng</text>
</svg>
