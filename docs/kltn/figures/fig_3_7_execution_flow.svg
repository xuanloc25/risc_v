<svg xmlns="http://www.w3.org/2000/svg" width="6.0in" height="8.0in" viewBox="0 0 950 1270" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Luồng thực thi chương trình hợp ngữ (đầu–cuối)</title>
  <desc id="desc">Sơ đồ hoạt động: nhập mã hợp ngữ, nhấn Assemble (khởi tạo lại SoC và biên dịch hai lượt), kiểm tra lỗi, nạp ảnh bộ nhớ và đặt PC, chọn Run hoặc Step, vòng chạy theo khung hình với điều kiện dừng, hoàn tất DMA và cập nhật giao diện cuối; có cung phản hồi quay lại chu trình chỉnh sửa–chạy lại.</desc>

  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <marker id="arrowRed" markerWidth="11" markerHeight="11" refX="8.5" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <style>
    .blk{stroke:#2d3436;stroke-width:1.5}
    .term{fill:#d6e4f5}
    .proc{fill:#eef2fb}
    .mem{fill:#e8e9fb}
    .cmp{fill:#fde8e8}
    .err{fill:#fdecea}
    .dec{fill:#fcf3cf}
    .note{fill:#f8fafc;stroke:#636e72;stroke-width:1.5;stroke-dasharray:5 4}
    .flow{fill:none;stroke:#2d3436;stroke-width:1.8;marker-end:url(#arrow)}
    .dashline{fill:none;stroke:#7f8c8d;stroke-width:1.4;stroke-dasharray:6 4}
    .feedback{fill:none;stroke:#c0392b;stroke-width:1.6;stroke-dasharray:7 4;marker-end:url(#arrowRed)}
    .title{font-size:18px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .lbl{font-size:15.1px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .lbl2{font-size:13.2px;fill:#2d3436;font-weight:550;text-anchor:middle}
    .term-t{font-size:16px;fill:#1b3a5b;font-weight:800;text-anchor:middle}
    .elbl{font-size:14.2px;fill:#2d3436;font-weight:800;text-anchor:middle}
    .tiny{font-size:12.8px;fill:#4d5963;font-weight:650;text-anchor:start}
    .noteText{font-size:13.3px;fill:#2d3436;font-weight:700;text-anchor:start}
    .feedbackNote{font-size:14.2px;fill:#2d3436;font-weight:750;text-anchor:start}
    .fb{font-size:15.2px;fill:#c0392b;font-weight:850;text-anchor:middle}
    .badge{fill:#ffffff;stroke:#2d3436;stroke-width:1.3}
    .bnum{font-size:13.2px;fill:#2d3436;font-weight:800;text-anchor:middle}
    .lg{font-size:13.8px;fill:#2d3436;font-weight:750;text-anchor:start}
    .ebg{fill:#ffffff;opacity:0.9}
  </style>

  <rect x="0" y="0" width="950" height="1270" fill="#ffffff"/>

  <!-- ================= EDGES (drawn first, under boxes) ================= -->
  <!-- main spine -->
  <path d="M400,67 L400,86" class="flow"/>
  <path d="M400,130 L400,150" class="flow"/>
  <path d="M400,190 L400,207" class="flow"/>
  <path d="M400,249 L400,267" class="flow"/>
  <path d="M400,321 L400,341" class="flow"/>
  <path d="M400,395 L400,412" class="flow"/>
  <path d="M400,492 L400,511" class="flow"/>
  <path d="M400,557 L400,578" class="flow"/>
  <path d="M400,626 L400,650" class="flow"/>
  <path d="M400,730 L400,786" class="flow"/>
  <path d="M400,830 L400,863" class="flow"/>
  <path d="M400,921 L400,944" class="flow"/>
  <path d="M400,1056 L400,1072" class="flow"/>
  <path d="M400,1119 L400,1146" class="flow"/>

  <!-- error branch (Có) and return to (1) -->
  <path d="M340,452 L255,452" class="flow"/>
  <path d="M165,430 L165,100 L265,100" class="flow"/>

  <!-- Step branch out and return loop -->
  <path d="M462,690 L600,690" class="flow"/>
  <path d="M715,712 L715,748" class="flow"/>
  <path d="M600,770 C545,770 535,720 466,694" class="flow"/>

  <!-- Run loop back (Chưa) -->
  <path d="M300,1000 L175,1000 L175,808 L255,808" class="flow"/>

  <!-- note connector (dashed, no arrow) -->
  <path d="M560,892 L625,892" class="dashline"/>

  <!-- End -> edit feedback (red dashed) -->
  <path d="M335,1166 L55,1166 L55,116 L265,116" class="feedback"/>

  <!-- ================= EDGE LABELS ================= -->
  <text x="300" y="443" class="elbl">Có</text>

  <text x="435" y="503" class="elbl">Không</text>

  <text x="426" y="764" class="elbl">Run</text>

  <text x="531" y="683" class="elbl">Step</text>

  <text x="213" y="994" class="elbl">Chưa</text>

  <text x="426" y="1062" class="elbl">Rồi</text>

  <text x="146" y="256" class="feedbackNote">sửa lỗi rồi Assemble lại</text>
  <text x="72" y="660" class="fb" text-anchor="middle" transform="rotate(-90 72 660)">chu trình chỉnh sửa – chạy lại</text>

  <!-- ================= NODES ================= -->
  <!-- Start -->
  <rect x="335" y="29" width="130" height="38" rx="19" class="blk term"/>
  <text x="400" y="53" class="term-t">Start</text>

  <!-- N1 (1) -->
  <rect x="265" y="86" width="270" height="44" rx="8" class="blk proc"/>
  <text x="400" y="113" class="lbl">Nhập / chọn mã hợp ngữ</text>

  <!-- N2 (2) -->
  <rect x="300" y="150" width="200" height="40" rx="8" class="blk proc"/>
  <text x="400" y="174" class="lbl">Nhấn Assemble</text>

  <!-- N3 -->
  <rect x="295" y="207" width="210" height="42" rx="8" class="blk mem"/>
  <text x="400" y="232" class="lbl">Khởi tạo lại SoC</text>

  <!-- N4 -->
  <rect x="250" y="267" width="300" height="54" rx="8" class="blk mem"/>
  <text x="400" y="289" class="lbl">Biên dịch lượt 1</text>
  <text x="400" y="309" class="lbl2">bảng nhãn, địa chỉ, directive</text>

  <!-- N5 -->
  <rect x="250" y="341" width="300" height="54" rx="8" class="blk mem"/>
  <text x="400" y="363" class="lbl">Biên dịch lượt 2</text>
  <text x="400" y="383" class="lbl2">mã hóa; ghi ảnh bộ nhớ</text>

  <!-- D1 decision: Có lỗi? -->
  <polygon points="400,412 460,452 400,492 340,452" class="blk dec"/>
  <text x="400" y="457" class="lbl">Có lỗi?</text>

  <!-- error box -->
  <rect x="75" y="430" width="180" height="44" rx="8" class="blk err"/>
  <text x="165" y="457" class="lbl">Hiển thị lỗi theo dòng</text>

  <!-- N6 -->
  <rect x="240" y="511" width="320" height="46" rx="8" class="blk mem"/>
  <text x="400" y="529" class="lbl">Xác định địa chỉ bắt đầu</text>
  <text x="400" y="545" class="lbl2">(_start hoặc lệnh đầu .text)</text>

  <!-- N7 (3) -->
  <rect x="240" y="578" width="320" height="48" rx="8" class="blk mem"/>
  <text x="400" y="597" class="lbl">Nạp ảnh bộ nhớ vào RAM, đặt PC = start,</text>
  <text x="400" y="613" class="lbl">lõi xử lý sẵn sàng</text>

  <!-- D2 decision: Run hay Step? (4) -->
  <polygon points="400,650 462,690 400,730 338,690" class="blk dec"/>
  <text x="400" y="694" class="lbl">Run hay Step?</text>

  <!-- Step branch boxes -->
  <rect x="600" y="668" width="230" height="44" rx="8" class="blk cmp"/>
  <text x="715" y="685" class="lbl">Tiến đúng một lệnh</text>
  <text x="715" y="701" class="lbl2">(stepInstruction)</text>

  <rect x="600" y="748" width="230" height="44" rx="8" class="blk cmp"/>
  <text x="715" y="775" class="lbl">Cập nhật giao diện</text>

  <!-- N8 Run loop -->
  <rect x="255" y="786" width="290" height="44" rx="8" class="blk cmp"/>
  <text x="400" y="803" class="lbl">Vòng lặp requestAnimationFrame</text>
  <text x="400" y="819" class="lbl2">(scheduleRunLoop)</text>

  <!-- N9 per-frame tick -->
  <rect x="240" y="863" width="320" height="58" rx="8" class="blk cmp"/>
  <text x="400" y="885" class="lbl">Mỗi khung hình: thực thi N chu kỳ (tick),</text>
  <text x="400" y="903" class="lbl">đo IPS, cập nhật giao diện</text>

  <!-- Note (tick detail) -->
  <rect x="625" y="853" width="270" height="78" rx="8" class="note"/>
  <text x="635" y="878" class="noteText">Mỗi tick: CPU nạp–giải mã–thực thi;</text>
  <text x="635" y="896" class="noteText">phát giao dịch Bus / DMA / Ngoại vi;</text>
  <text x="635" y="914" class="noteText">xử lý ECALL &amp; xuất I/O.</text>

  <!-- D3 decision stop condition -->
  <polygon points="400,944 520,1000 400,1056 280,1000" class="blk dec"/>
  <text x="400" y="995" class="lbl">Điểm dừng / halt /</text>
  <text x="400" y="1016" class="lbl">vượt số chu kỳ tối đa?</text>

  <!-- N10 (5) -->
  <rect x="240" y="1072" width="320" height="47" rx="8" class="blk proc"/>
  <text x="400" y="1091" class="lbl">Hoàn tất DMA còn dở,</text>
  <text x="400" y="1107" class="lbl">cập nhật giao diện cuối</text>

  <!-- End -->
  <rect x="335" y="1146" width="130" height="40" rx="20" class="blk term"/>
  <text x="400" y="1171" class="term-t">End</text>

  <!-- ================= STEP NUMBER BADGES ================= -->
  <circle cx="265" cy="86" r="11" class="badge"/>
  <text x="265" y="90" class="bnum">1</text>
  <circle cx="300" cy="150" r="11" class="badge"/>
  <text x="300" y="154" class="bnum">2</text>
  <circle cx="240" cy="578" r="11" class="badge"/>
  <text x="240" y="582" class="bnum">3</text>
  <circle cx="343" cy="660" r="11" class="badge"/>
  <text x="343" y="664" class="bnum">4</text>
  <circle cx="240" cy="1072" r="11" class="badge"/>
  <text x="240" y="1076" class="bnum">5</text>

  <!-- ================= LEGEND ================= -->
  <rect x="78" y="1224" width="800" height="34" rx="6" fill="#fbfbfd" stroke="#d4d8de" stroke-width="1"/>

  <rect x="92" y="1232" width="34" height="18" rx="9" class="blk term"/>
  <text x="134" y="1245" class="lg">Bắt đầu / Kết thúc</text>

  <rect x="268" y="1232" width="30" height="18" rx="4" class="blk proc"/>
  <text x="306" y="1245" class="lg">Hành động / xử lý</text>

  <polygon points="480,1232 500,1241 480,1250 460,1241" class="blk dec"/>
  <text x="508" y="1245" class="lg">Quyết định</text>

  <line x1="600" y1="1241" x2="638" y2="1241" class="feedback"/>
  <text x="646" y="1245" class="lg">Cung phản hồi (chỉnh sửa–chạy lại)</text>
</svg>
