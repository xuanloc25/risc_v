<svg xmlns="http://www.w3.org/2000/svg" width="6.0in" height="6.875in" viewBox="0 0 960 1100" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Quy trình truyền của bộ điều khiển DMA</title>
  <desc id="desc">Sơ đồ quy trình hoạt động của bộ điều khiển DMA, mô tả các luồng ghi Descriptor và ghi Control, kiểm tra điều kiện khởi chạy, quá trình lấy mô tả và vòng lặp truyền từng phần tử bằng các pha đọc/ghi bất đồng bộ.</desc>

  <defs>
    <!-- Mũi tên mặc định -->
    <marker id="arrowEnd" markerWidth="11" markerHeight="11" refX="8.8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <!-- Mũi tên chú thích - Màu cam -->
    <marker id="arrowBypass" markerWidth="9" markerHeight="9" refX="7.2" refY="3.6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3.6 L0,7.2 Z" fill="#e8590c"/>
    </marker>
  </defs>

  <style>
    .bg { fill:#ffffff; }
    .box { stroke:#2d3436; stroke-width:2.0; stroke-linejoin:round; }
    
    /* Màu nền các loại khối */
    .descBox { fill:#eaf6ff; }     /* Xanh dương nhạt (Descriptor và FIFO) */
    .ctrlBox { fill:#efe9f5; }     /* Tím oải hương nhạt (Control) */
    .mergeBox { fill:#fff4e6; }    /* Cam sữa nhạt (Khởi động) */
    .loopBox { fill:#fdfbe0; }     /* Vàng cát nhạt (Điều phối phần tử) */
    .ioBox { fill:#e6f4ea; }       /* Xanh lá nhạt (Pha đọc/ghi bus) */
    .endBox { fill:#f8fafc; }      /* Xám nhạt (Kết thúc) */
    
    .diamond { fill:#ffffff; stroke:#2d3436; stroke-width:2.0; stroke-linejoin:round; }
    .noteBox { fill:#fff9db; stroke:#e8590c; stroke-width:1.5; stroke-dasharray:6 4; rx:8px; }
    
    /* Đường nối và mũi tên */
    .pathNormal { fill:none; stroke:#2d3436; stroke-width:2.5; marker-end:url(#arrowEnd); stroke-linecap:round; stroke-linejoin:round; }
    .pathConnect { fill:none; stroke:#2d3436; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
    .pathDash { fill:none; stroke:#e8590c; stroke-width:1.8; stroke-dasharray:5 4; marker-end:url(#arrowBypass); }
    
    /* Kiểu văn bản (Cỡ chữ to rõ để in ấn) */
    .bodyText { font-size:18px; fill:#2d3436; font-weight:750; text-anchor:middle; }
    .labelText { font-size:16px; fill:#2d3436; font-weight:850; text-anchor:middle; }
    .italicText { font-size:16px; fill:#52616f; font-weight:750; font-style:italic; text-anchor:middle; }
    .italicTextEnd { font-size:15px; fill:#0b7285; font-weight:750; font-style:italic; text-anchor:end; }
    .italicTextStart { font-size:15px; fill:#0b7285; font-weight:750; font-style:italic; text-anchor:start; }
    .noteTextTitle { font-size:15px; fill:#e8590c; font-weight:850; text-anchor:middle; }
    .noteContent { font-size:14px; fill:#2d3436; font-weight:750; text-anchor:start; }
    .mono { font-family:Consolas, "Courier New", monospace; }
  </style>

  <!-- Nền trắng toàn cục -->
  <rect class="bg" x="0" y="0" width="960" height="1100"/>

  <!-- ==================== NHÁNH TRÁI: GHI DESCRIPTOR & FIFO ==================== -->
  <!-- Node A1 -->
  <rect x="95" y="60" width="250" height="60" rx="8" class="box descBox"/>
  <text x="220" y="92" class="bodyText">Ghi 3 word vào DESC</text>
  <text x="220" y="110" class="italicText mono">(0xFFED0004)</text>

  <!-- A1 -> A2 -->
  <path d="M 220,120 V 150" class="pathNormal"/>

  <!-- Node A2 -->
  <rect x="95" y="150" width="250" height="60" rx="8" class="box descBox"/>
  <text x="220" y="188" class="bodyText">Ghép thành DMADescriptor</text>

  <!-- A2 -> A3 -->
  <path d="M 220,210 V 240" class="pathNormal"/>

  <!-- Node A3 -->
  <rect x="95" y="240" width="250" height="60" rx="8" class="box descBox"/>
  <text x="220" y="278" class="bodyText">Đẩy vào FIFO (sâu 8)</text>

  <!-- A3 -> Đường nối chung -->
  <path d="M 220,300 V 330 H 480" class="pathConnect"/>


  <!-- ==================== NHÁNH PHẢI: GHI CONTROL REGISTER ==================== -->
  <!-- Node B1 -->
  <rect x="515" y="130" width="250" height="80" rx="8" class="box ctrlBox"/>
  <text x="640" y="165" class="bodyText">Ghi CTRL (0xFFED0000)</text>
  <text x="640" y="190" class="italicText">bit enable + bit start</text>

  <!-- B1 -> Đường nối chung -->
  <path d="M 640,210 V 330 H 480" class="pathConnect"/>


  <!-- ==================== HỢP LUỒNG VÀ NÚT QUYẾT ĐỊNH KHỞI CHẠY ==================== -->
  <!-- Đường từ điểm hợp luồng vào D1 -->
  <path d="M 480,330 V 350" class="pathNormal"/>

  <!-- Nút quyết định D1: canStartTransfer? -->
  <path d="M 480,350 L 590,395 L 480,440 L 370,395 Z" class="diamond"/>
  <text x="480" y="400" class="bodyText" font-weight="bold">canStartTransfer?</text>

  <!-- Nhánh KHÔNG: Quay lại đợi (Đã đổi sang pathConnect để xóa đầu mũi tên chỉ trái dư thừa) -->
  <path d="M 590,395 H 680 V 330 H 480" class="pathConnect"/>
  <text x="635" y="378" class="labelText">KHÔNG</text>

  <!-- Nhánh CÓ: Vào khối merge -->
  <path d="M 480,440 V 480" class="pathNormal"/>
  <text x="495" y="465" class="labelText">CÓ</text>


  <!-- ==================== KHỐI KHỞI ĐỘNG TRUYỀN (MERGE NODE) ==================== -->
  <!-- Node C1 -->
  <rect x="220" y="480" width="520" height="80" rx="8" class="box mergeBox"/>
  <text x="480" y="512" class="bodyText">Lấy mô tả khỏi FIFO; giải mã configWord</text>
  <text x="480" y="535" class="italicText">(numElements, bswap, srcMode, dstMode); thiết lập busy = 1</text>

  <!-- C1 -> L1 (Vào vòng lặp) -->
  <path d="M 480,560 V 570 H 220 V 585" class="pathNormal"/>


  <!-- ==================== VÒNG LẶP TRUYỀN TỪNG PHẦN TỬ (CHẠY THEO KIM ĐỒNG HỒ) ==================== -->
  <!-- L1: Tính địa chỉ -->
  <rect x="100" y="585" width="240" height="60" rx="8" class="box loopBox"/>
  <text x="220" y="613" class="bodyText">Tính &amp; chốt địa chỉ</text>
  <text x="220" y="633" class="bodyText">nguồn/đích</text>

  <!-- L1 -> L2 (Ngang sang Pha Đọc) -->
  <path d="M 340,615 H 510" class="pathNormal"/>

  <!-- L2: Pha Đọc (READ Phase) -->
  <rect x="510" y="575" width="260" height="80" rx="8" class="box ioBox"/>
  <text x="640" y="605" class="bodyText" font-weight="bold">Pha READ</text>
  <text x="640" y="627" class="labelText">phát Get → chốt dữ liệu</text>
  <text x="640" y="645" class="italicText">(đảo byte nếu bswap)</text>

  <!-- Giao dịch bất đồng bộ trên bus (Pha READ) - Dịch sang TRÁI dây nối -->
  <text x="615" y="675" class="italicTextEnd">giao dịch bất đồng bộ trên bus</text>
  <text x="615" y="689" class="italicTextEnd">(waitingRequest / pendingResponse)</text>

  <!-- L2 -> L3 (Dọc xuống Pha Ghi) -->
  <path d="M 640,655 V 700" class="pathNormal"/>

  <!-- L3: Pha Ghi (WRITE Phase) -->
  <rect x="510" y="700" width="260" height="80" rx="8" class="box ioBox"/>
  <text x="640" y="730" class="bodyText" font-weight="bold">Pha WRITE</text>
  <text x="640" y="752" class="labelText">phát Put → chờ xác nhận</text>

  <!-- L3 -> L4 (Ngang & Dọc sang tiến độ += 1) (Đã xóa dòng chữ bus dư thừa dưới pha WRITE) -->
  <path d="M 640,780 V 815 H 220 V 850" class="pathNormal"/>

  <!-- L4: Tăng tiến độ -->
  <rect x="130" y="850" width="180" height="60" rx="8" class="box loopBox"/>
  <text x="220" y="885" class="bodyText">tiến độ += 1</text>

  <!-- L4 -> L5 (Xuống nút quyết định của vòng lặp) -->
  <path d="M 220,910 V 940" class="pathNormal"/>

  <!-- L5: Nút quyết định đã đủ chưa? (Mở rộng w=240, từ x=100 đến x=340) -->
  <path d="M 220,940 L 340,985 L 220,1030 L 100,985 Z" class="diamond"/>
  <text x="220" y="991" class="bodyText" font-weight="bold">đã đủ numElements?</text>

  <!-- Nhánh CHƯA: Quay lại L1 (Cạnh bên trái vòng ngoài - Nối về x=100) -->
  <path d="M 100,985 H 40 V 615 H 100" class="pathNormal"/>
  <text x="95" y="975" class="labelText">CHƯA</text>

  <!-- Nhánh RỒI: Sang khối kết thúc E1 (Nối từ x=340) -->
  <path d="M 340,985 H 520" class="pathNormal"/>
  <text x="350" y="975" class="labelText">RỒI</text>


  <!-- ==================== TRẠNG THÁI KẾT THÚC ==================== -->
  <!-- Node E1 -->
  <rect x="520" y="955" width="240" height="60" rx="8" class="box endBox"/>
  <text x="640" y="990" class="bodyText" font-weight="bold">done = 1, busy = 0</text>


  <!-- ==================== CHÚ THÍCH BÊN (ANNOTATIONS) ==================== -->
  <!-- Chú thích 1: Chọn bus -->
  <rect x="800" y="615" width="145" height="130" class="noteBox"/>
  <text x="872.5" y="640" class="noteTextTitle" font-weight="bold">Chọn bus</text>
  <text x="815" y="665" class="noteContent">Theo địa chỉ:</text>
  <text x="815" y="690" class="noteContent">• UH cho RAM</text>
  <text x="815" y="715" class="noteContent">• UL cho ngoại vi</text>

  <!-- Đường nối từ Chú thích 1 sang L2 và L3 -->
  <path d="M 800,650 L 770,615" class="pathDash"/>
  <path d="M 800,710 L 770,740" class="pathDash"/>

  <!-- Chú thích 2: Polling -->
  <rect x="490" y="1035" width="300" height="45" class="noteBox"/>
  <text x="640" y="1062" class="labelText" font-size="14.5px" fill="#e8590c">Hoàn tất nhận biết bằng polling</text>

  <!-- Đường nối từ E1 xuống Chú thích 2 -->
  <path d="M 640,1015 V 1035" class="pathDash"/>
</svg>
