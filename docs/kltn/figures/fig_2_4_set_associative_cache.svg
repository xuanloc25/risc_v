<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">Tổ chức bộ nhớ đệm kết hợp tập</title>
  <desc id="desc">Địa chỉ bộ nhớ được tách thành tag, chỉ số tập và offset. Chỉ số tập chọn một set; tag được so sánh song song với tag của các way trong set để xác định hit hoặc miss, sau đó offset chọn byte trong block dữ liệu.</desc>
  <defs>
    <marker id="aEnd" markerWidth="10" markerHeight="10" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <marker id="aEndMuted" markerWidth="10" markerHeight="10" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#636e72"/>
    </marker>
  </defs>

  <!-- Address breakdown (shifted left to x=50 for right margin clearance in 960px canvas) -->
  <text x="480" y="36" font-size="24" fill="#2d3436" font-weight="bold" text-anchor="middle">Địa chỉ bộ nhớ</text>
  <g transform="translate(50 58)">
    <rect x="0" y="0" width="380" height="56" rx="6" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
    <text x="190" y="24" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Tag</text>
    <text x="190" y="41" font-size="13" fill="#636e72" text-anchor="middle">so sánh với tag trong set</text>
    
    <rect x="380" y="0" width="240" height="56" rx="6" fill="#efe9f5" stroke="#2d3436" stroke-width="1.5"/>
    <text x="500" y="24" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Chỉ số tập (index)</text>
    <text x="500" y="41" font-size="13" fill="#636e72" text-anchor="middle">chọn một set</text>
    
    <rect x="620" y="0" width="240" height="56" rx="6" fill="#fdfbe0" stroke="#2d3436" stroke-width="1.5"/>
    <text x="740" y="24" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Độ dịch trong khối</text>
    <text x="740" y="41" font-size="13" fill="#636e72" text-anchor="middle">chọn byte/word trong block</text>
    
    <text x="0" y="-10" font-size="12" fill="#636e72" text-anchor="middle">bit cao</text>
    <text x="860" y="-10" font-size="12" fill="#636e72" text-anchor="middle">bit thấp</text>
  </g>

  <!-- Set index list -->
  <rect x="58" y="170" width="238" height="344" rx="8" fill="none" stroke="#9aa3ad" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="177" y="196" font-size="17" fill="#2d3436" font-weight="bold" text-anchor="middle">Mảng set của cache</text>

  <g transform="translate(88 238)">
    <rect x="0" y="0" width="178" height="42" rx="5" fill="#f7f8fb" stroke="#9aa3ad" stroke-width="1.5"/>
    <text x="89" y="26" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Set 0</text>
    
    <rect x="0" y="54" width="178" height="42" rx="5" fill="#f7f8fb" stroke="#9aa3ad" stroke-width="1.5"/>
    <text x="89" y="80" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Set 1</text>
    
    <rect x="0" y="108" width="178" height="54" rx="5" fill="#efe9f5" stroke="#2d3436" stroke-width="1.8"/>
    <text x="89" y="131" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Set i</text>
    <text x="89" y="150" font-size="13" fill="#636e72" text-anchor="middle">được chọn</text>
    
    <text x="89" y="196" font-size="17" fill="#2d3436" font-weight="bold" text-anchor="middle">...</text>
    
    <rect x="0" y="226" width="178" height="42" rx="5" fill="#f7f8fb" stroke="#9aa3ad" stroke-width="1.5"/>
    <text x="89" y="252" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Set S-1</text>
  </g>

  <!-- Expanded selected set -->
  <rect x="342" y="166" width="330" height="364" rx="8" fill="none" stroke="#9aa3ad" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="507" y="194" font-size="17" fill="#2d3436" font-weight="bold" text-anchor="middle">Set i gồm 4 đường (4-way)</text>
  <text x="507" y="213" font-size="13" fill="#636e72" text-anchor="middle">mỗi way lưu valid, tag và block dữ liệu</text>

  <g id="way0" transform="translate(372 236)">
    <rect x="0" y="0" width="270" height="52" rx="6" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
    <text x="31" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Way 0</text>
    
    <rect x="70" y="10" width="30" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="85" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">V</text>
    
    <rect x="108" y="10" width="78" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="147" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Tag0</text>
    
    <rect x="194" y="10" width="56" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="222" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Data</text>
  </g>
  <g id="way1" transform="translate(372 304)">
    <rect x="0" y="0" width="270" height="52" rx="6" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
    <text x="31" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Way 1</text>
    
    <rect x="70" y="10" width="30" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="85" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">V</text>
    
    <rect x="108" y="10" width="78" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="147" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Tag1</text>
    
    <rect x="194" y="10" width="56" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="222" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Data</text>
  </g>
  <g id="way2" transform="translate(372 372)">
    <rect x="0" y="0" width="270" height="52" rx="6" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
    <text x="31" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Way 2</text>
    
    <rect x="70" y="10" width="30" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="85" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">V</text>
    
    <rect x="108" y="10" width="78" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="147" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Tag2</text>
    
    <rect x="194" y="10" width="56" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="222" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Data</text>
  </g>
  <g id="way3" transform="translate(372 440)">
    <rect x="0" y="0" width="270" height="52" rx="6" fill="#e8e9fb" stroke="#2d3436" stroke-width="1.5"/>
    <text x="31" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Way 3</text>
    
    <rect x="70" y="10" width="30" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="85" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">V</text>
    
    <rect x="108" y="10" width="78" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="147" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Tag3</text>
    
    <rect x="194" y="10" width="56" height="32" rx="4" fill="#ffffff" stroke="#2d3436" stroke-width="1.05"/>
    <text x="222" y="31" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Data</text>
  </g>

  <!-- Comparator bank (shifted left to x=685, width=237) -->
  <rect x="685" y="166" width="237" height="344" rx="8" fill="none" stroke="#9aa3ad" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="803" y="194" font-size="17" fill="#2d3436" font-weight="bold" text-anchor="middle">So sánh tag song song</text>
  <text x="803" y="213" font-size="13" fill="#636e72" text-anchor="middle">một bộ so sánh cho mỗi way</text>

  <!-- Comparators inside (shifted left by 12px, translate(700 238)) -->
  <g transform="translate(700 238)">
    <rect x="0" y="0" width="114" height="42" rx="6" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
    <text x="57" y="26" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Tag = Tag0?</text>
    
    <rect x="0" y="68" width="114" height="42" rx="6" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
    <text x="57" y="94" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Tag = Tag1?</text>
    
    <rect x="0" y="136" width="114" height="42" rx="6" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
    <text x="57" y="162" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Tag = Tag2?</text>
    
    <rect x="0" y="204" width="114" height="42" rx="6" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
    <text x="57" y="230" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Tag = Tag3?</text>
  </g>

  <!-- OR Gate (taller and shifted right to x=860, y=307, height=80) -->
  <rect x="860" y="307" width="62" height="80" rx="6" fill="#ffffff" stroke="#2d3436" stroke-width="1.5"/>
  <text x="891" y="340" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">OR</text>
  <text x="891" y="358" font-size="13" fill="#636e72" text-anchor="middle">hit?</text>

  <!-- Data selector -->
  <rect x="718" y="532" width="184" height="52" rx="6" fill="#fdfbe0" stroke="#2d3436" stroke-width="1.5"/>
  <text x="810" y="554" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Chọn dữ liệu</text>
  <text x="810" y="572" font-size="13" fill="#636e72" text-anchor="middle">way khớp + offset</text>

  <!-- Cache Miss -->
  <rect x="70" y="542" width="250" height="48" rx="6" fill="#fde8e8" stroke="#2d3436" stroke-width="1.5"/>
  <text x="195" y="562" font-size="15" fill="#2d3436" font-weight="bold" text-anchor="middle">Miss</text>
  <text x="195" y="579" font-size="13" fill="#636e72" text-anchor="middle">nạp block từ L2 / bộ nhớ chính</text>

  <!-- Connections -->
  <!-- Index path (re-centered at x=550) -->
  <path d="M550 114 L550 138 L177 138 L177 238" stroke="#2d3436" stroke-width="2" fill="none" marker-end="url(#aEnd)"/>
  
  <!-- Way selection path -->
  <path d="M266 373 L342 373" stroke="#2d3436" stroke-width="2" fill="none" marker-end="url(#aEnd)"/>

  <!-- Address tag bus to comparators (re-centered at x=240, comparators shifted to x=700) -->
  <path d="M240 114 L240 144 L686 144 L686 474 L700 474" stroke="#636e72" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#aEndMuted)"/>
  <path d="M686 270 L700 270" stroke="#636e72" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#aEndMuted)"/>
  <path d="M686 338 L700 338" stroke="#636e72" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#aEndMuted)"/>
  <path d="M686 406 L700 406" stroke="#636e72" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#aEndMuted)"/>

  <!-- Way tag to comparators (shifted left by 12px to match comparator x=700) -->
  <path d="M519 246 L519 226 L690 226 L690 248 L700 248" stroke="#2d3436" stroke-width="1.6" fill="none" marker-end="url(#aEnd)"/>
  <path d="M519 314 L519 294 L690 294 L690 316 L700 316" stroke="#2d3436" stroke-width="1.6" fill="none" marker-end="url(#aEnd)"/>
  <path d="M519 382 L519 362 L690 362 L690 384 L700 384" stroke="#2d3436" stroke-width="1.6" fill="none" marker-end="url(#aEnd)"/>
  <path d="M519 450 L519 430 L690 430 L690 452 L700 452" stroke="#2d3436" stroke-width="1.6" fill="none" marker-end="url(#aEnd)"/>

  <!-- Comparator outputs to OR gate (neatly distributed vertically and nested horizontally) -->
  <!-- Spaced wider vertically (y=317, 337, 357, 377) and horizontally (x=822, 831, 840, 849) -->
  <path d="M814 259 H822 V317 H860" stroke="#636e72" stroke-width="1.6" fill="none" marker-end="url(#aEndMuted)"/>
  <path d="M814 327 H831 V337 H860" stroke="#636e72" stroke-width="1.6" fill="none" marker-end="url(#aEndMuted)"/>
  <path d="M814 395 H840 V357 H860" stroke="#636e72" stroke-width="1.6" fill="none" marker-end="url(#aEndMuted)"/>
  <path d="M814 463 H849 V377 H860" stroke="#636e72" stroke-width="1.6" fill="none" marker-end="url(#aEndMuted)"/>

  <!-- Hit/miss and data selection (Straight vertical line down empty space on the right, entering at x=891) -->
  <path d="M891 387 L891 532" stroke="#2d3436" stroke-width="2" fill="none" marker-end="url(#aEnd)"/>
  
  <!-- OR output to Miss path (Bottom segment lowered to y=620, running below selector & miss box) -->
  <path d="M922 347 L945 347 L945 620 L195 620 V590" stroke="#636e72" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#aEndMuted)"/>

  <!-- Offset bypass to data selection (Starts from right-middle of Offset box at x=910, y=86, routed at x=935) -->
  <path d="M910 86 L935 86 L935 558 L902 558" stroke="#636e72" stroke-width="1.6" fill="none" marker-end="url(#aEndMuted)"/>

  <!-- Data paths from ways to selector -->
  <path d="M622 262 L650 262 L650 552 L718 552" stroke="#2d3436" stroke-width="2.35" fill="none" marker-end="url(#aEnd)"/>
  <path d="M622 330 L656 330 L656 558 L718 558" stroke="#2d3436" stroke-width="2.35" fill="none" marker-end="url(#aEnd)"/>
  <path d="M622 398 L662 398 L662 565 L718 565" stroke="#2d3436" stroke-width="2.35" fill="none" marker-end="url(#aEnd)"/>
  <path d="M622 466 L668 466 L668 572 L718 572" stroke="#2d3436" stroke-width="2.35" fill="none" marker-end="url(#aEnd)"/>
</svg>
