<svg xmlns="http://www.w3.org/2000/svg" width="15.5cm" height="9.07cm" viewBox="16 45 1008 590" font-family="Segoe UI, Arial, sans-serif" role="img" aria-labelledby="desc">
  <title id="title">Mô hình cổng kết nối giữa các mô-đun</title>
  <desc id="desc">Bên trái minh họa cổng liên kết điểm-điểm giữa CPU, MMU và Cache; bên phải minh họa cách đăng ký Port.upper, Port.lower và Port.memory vào bus TileLink-UH.</desc>
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2d3436"/>
    </marker>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="0" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M9,0 L0,4.5 L9,9 Z" fill="#2d3436"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="9" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#636e72"/>
    </marker>
  </defs>
  <style>
    .frame{fill:none;stroke:#9aa3ad;stroke-width:1.25;stroke-dasharray:5 4}
    .blk{stroke:#2d3436;stroke-width:1.5}
    .port{fill:#ffffff;stroke:#2d3436;stroke-width:1.45}
    .compute{fill:#fde8e8}
    .memory{fill:#e8e9fb}
    .bus{fill:#efe9f5}
    .slave{fill:#fdfbe0}
    .debug{fill:#f5f6f8}
    .request{stroke:#2d3436;stroke-width:2;fill:none;marker-end:url(#arrowDown)}
    .response{stroke:#2d3436;stroke-width:2;fill:none;marker-start:url(#arrowUp)}
    .attach{stroke:#2d3436;stroke-width:1.8;fill:none;marker-end:url(#arrowDown)}
    .debug-link{stroke:#636e72;stroke-width:1.6;stroke-dasharray:5 4;fill:none;marker-end:url(#arrowMuted)}
    .title{display:none;font-size:17px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .sec{font-size:16.2px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .lbl{font-size:15.5px;fill:#2d3436;font-weight:700;text-anchor:middle}
    .sub{font-size:13.6px;fill:#636e72;text-anchor:middle}
    .tiny{font-size:13px;fill:#636e72;text-anchor:middle}
    .legend{font-size:15px;fill:#2d3436;text-anchor:start}
    .tag{font-size:12.8px;fill:#2d3436;font-family:Consolas, monospace;text-anchor:middle}
    .api{font-size:12.3px;fill:#2d3436;font-family:Consolas, monospace;text-anchor:middle}
  </style>

  <text x="520" y="34" class="title">Mô hình cổng kết nối giữa các mô-đun</text>

  <!-- Part A -->
  <rect x="32" y="60" width="432" height="536" rx="8" class="frame"/>
  <text x="248" y="88" class="sec">(a) Port.link: liên kết điểm-điểm</text>

  <rect x="168" y="118" width="160" height="58" rx="7" class="blk compute"/>
  <text x="248" y="142" class="lbl">CPU</text>
  <text x="248" y="159" class="sub">Upper component</text>

  <rect x="168" y="287" width="160" height="58" rx="7" class="blk memory"/>
  <text x="248" y="311" class="lbl">MMU</text>
  <text x="248" y="328" class="sub">Upper/lower component</text>

  <rect x="168" y="456" width="160" height="58" rx="7" class="blk memory"/>
  <text x="248" y="480" class="lbl">Cache</text>
  <text x="248" y="497" class="sub">Lower component</text>

  <!-- CPU-MMU port -->
  <rect x="183" y="204" width="130" height="48" rx="24" class="port"/>
  <text x="248" y="224" class="lbl">Port (link)</text>
  <text x="248" y="240" class="tag">cpu-to-mmu</text>

  <path d="M226 176 L226 204" class="request"/>
  <path d="M226 252 L226 287" class="request"/>
  <path d="M270 287 L270 252" class="response"/>
  <path d="M270 204 L270 176" class="response"/>
  <text x="179" y="201" class="api">sendRequest</text>
  <text x="174" y="271" class="api">receiveRequest</text>
  <text x="318" y="271" class="api">sendResponse</text>
  <text x="325" y="201" class="api">receiveResponse</text>
  <text x="88" y="236" class="tiny">Yêu cầu đi xuống</text>
  <text x="402" y="236" class="tiny">Phản hồi đi lên</text>

  <!-- MMU-Cache port -->
  <rect x="183" y="373" width="130" height="48" rx="24" class="port"/>
  <text x="248" y="393" class="lbl">Port (link)</text>
  <text x="248" y="409" class="tag">mmu-to-cache</text>

  <path d="M226 345 L226 373" class="request"/>
  <path d="M226 421 L226 456" class="request"/>
  <path d="M270 456 L270 421" class="response"/>
  <path d="M270 373 L270 345" class="response"/>
  <text x="179" y="370" class="api">sendRequest</text>
  <text x="174" y="440" class="api">receiveRequest</text>
  <text x="318" y="440" class="api">sendResponse</text>
  <text x="325" y="370" class="api">receiveResponse</text>

  <rect x="44" y="536" width="408" height="34" rx="5" class="debug"/>
  <text x="248" y="558" class="tiny">Port giữ tham chiếu upper/lower và chuẩn hóa API request/response.</text>

  <!-- Part B -->
  <rect x="496" y="60" width="512" height="536" rx="8" class="frame"/>
  <text x="752" y="88" class="sec">(b) Đăng ký endpoint vào bus host</text>

  <!-- Masters -->
  <rect x="572" y="118" width="132" height="54" rx="7" class="blk compute"/>
  <text x="638" y="141" class="lbl">CPU/L2</text>
  <text x="638" y="158" class="sub">Master</text>
  <rect x="802" y="118" width="132" height="54" rx="7" class="blk compute"/>
  <text x="868" y="141" class="lbl">DMA</text>
  <text x="868" y="158" class="sub">Master</text>

  <rect x="566" y="209" width="144" height="44" rx="22" class="port"/>
  <text x="638" y="227" class="lbl">Port.upper</text>
  <text x="638" y="242" class="tag">l2-to-tilelink-uh</text>
  <rect x="796" y="209" width="144" height="44" rx="22" class="port"/>
  <text x="868" y="227" class="lbl">Port.upper</text>
  <text x="868" y="242" class="tag">dma</text>

  <rect x="600" y="298" width="304" height="70" rx="8" class="blk bus"/>
  <text x="752" y="326" class="lbl">TileLink-UH</text>
  <text x="752" y="345" class="sub">Host bus / interconnect</text>

  <path d="M638 172 L638 209" class="attach"/>
  <path d="M638 253 L674 298" class="attach"/>
  <path d="M868 172 L868 209" class="attach"/>
  <path d="M868 253 L830 298" class="attach"/>

  <!-- Slaves -->
  <rect x="526" y="414" width="136" height="44" rx="22" class="port"/>
  <text x="594" y="432" class="lbl">Port.lower</text>
  <text x="594" y="447" class="tag">match(addr)</text>
  <rect x="526" y="494" width="136" height="54" rx="7" class="blk memory"/>
  <text x="594" y="516" class="lbl">Main Memory</text>
  <text x="594" y="533" class="sub">Cacheable range</text>

  <rect x="685" y="414" width="136" height="44" rx="22" class="port"/>
  <text x="753" y="432" class="lbl">Port.lower</text>
  <text x="753" y="447" class="tag">match(addr)</text>
  <rect x="685" y="494" width="136" height="54" rx="7" class="blk slave"/>
  <text x="753" y="516" class="lbl">DMA Regs</text>
  <text x="753" y="533" class="sub">MMIO control</text>

  <rect x="844" y="414" width="136" height="44" rx="22" class="port"/>
  <text x="912" y="432" class="lbl">Port.lower</text>
  <text x="912" y="447" class="tag">match(addr)</text>
  <rect x="844" y="494" width="136" height="54" rx="7" class="blk bus"/>
  <text x="912" y="516" class="lbl">Bridge → UL</text>
  <text x="912" y="533" class="sub">Peripheral range</text>

  <path d="M648 368 L594 414" class="attach"/>
  <path d="M594 458 L594 494" class="attach"/>
  <path d="M752 368 L753 414" class="attach"/>
  <path d="M753 458 L753 494" class="attach"/>
  <path d="M856 368 L912 414" class="attach"/>
  <path d="M912 458 L912 494" class="attach"/>

  <!-- Memory debug view -->
  <rect x="515" y="286" width="72" height="44" rx="22" class="port"/>
  <text x="551" y="304" class="lbl">Port</text>
  <text x="551" y="319" class="tag">memory</text>
  <rect x="512" y="346" width="78" height="40" rx="6" class="debug"/>
  <text x="551" y="362" class="tiny">Memory</text>
  <text x="551" y="376" class="tiny">View</text>
  <path d="M600 333 L587 320" class="debug-link"/>
  <path d="M551 330 L551 346" class="debug-link"/>

  <rect x="514" y="552" width="474" height="40" rx="5" class="debug"/>
  <text x="752" y="568" class="tiny">Upper ports đăng ký master; lower ports đăng ký slave</text>
  <text x="752" y="584" class="tiny">kèm hàm match địa chỉ.</text>

  <!-- Legend -->
  <rect x="176" y="602" width="22" height="14" rx="3" class="blk compute"/>
  <text x="212" y="615" class="legend">Master/Compute</text>
  <rect x="372" y="602" width="22" height="14" rx="3" class="blk memory"/>
  <text x="408" y="615" class="legend">Memory/Cache</text>
  <rect x="560" y="602" width="22" height="14" rx="3" class="blk bus"/>
  <text x="596" y="615" class="legend">TileLink/Bus</text>
  <rect x="736" y="602" width="22" height="14" rx="3" class="blk slave"/>
  <text x="772" y="615" class="legend">MMIO Slave</text>
</svg>
